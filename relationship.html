    // ─── Theme switcher ───
    var themeSelect = document.getElementById('theme-select');
    var currentTheme = localStorage.getItem('co-nguyen-theme') || 'thuy-mac';
    themeSelect.value = currentTheme;
    themeSelect.addEventListener('change', function() {
        var t = this.value;
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('co-nguyen-theme', t);
    });

    // ─── Mode toggle ───
    var modeToggle = document.getElementById('mode-toggle');
    modeToggle.addEventListener('click', function(e) {
        if (e.target.classList.contains('mode-btn') && !e.target.classList.contains('active')) {
            var newMode = e.target.getAttribute('data-mode');
            var btns = modeToggle.querySelectorAll('.mode-btn');
            for (var bi = 0; bi < btns.length; bi++) {
                btns[bi].classList.remove('active');
            }
            e.target.classList.add('active');

            if (newMode === 'faction') {
                switchToFactionView();
            } else {
                switchToCharacterView();
            }
        }
    });

    function switchToFactionView() {
        if (viewMode === 'faction') return;
        viewMode = 'faction';
        deselectNode();

        // Build/rebuild faction graph
        buildFactionGraph();

        // Update search placeholder
        searchBox.placeholder = 'T\u00ean th\u1EBF l\u1EF1c...';
        searchBox.value = '';
        searchActive = false;
        for (var i = 0; i < factionNodes.length; i++) {
            factionNodes[i].dimmed = false;
        }

        // Update faction visibility based on region filters
        updateNodeVisibility();

        // Reheat simulation
        simCooling = 1.0;
        simIterations = 0;

        // Fit view after settling
        setTimeout(function() { fitView(); }, 200);
        setTimeout(function() { fitView(); }, 1500);

        // Update mode toggle buttons
        var btns = modeToggle.querySelectorAll('.mode-btn');
        for (var bi = 0; bi < btns.length; bi++) {
            btns[bi].classList.remove('active');
            if (btns[bi].getAttribute('data-mode') === 'faction') {
                btns[bi].classList.add('active');
            }
        }
    }

    function switchToCharacterView() {
        if (viewMode === 'character') return;
        viewMode = 'character';
        deselectNode();

        // Update search placeholder
        searchBox.placeholder = 'T\u00ean nh\u00E2n v\u1EADt...';
        searchBox.value = '';
        searchActive = false;
        for (var i = 0; i < nodes.length; i++) {
            nodes[i].dimmed = false;
        }

        // Update visibility
        updateNodeVisibility();

        // Reheat simulation briefly to re-settle
        simCooling = Math.max(simCooling, 0.5);
        simIterations = Math.min(simIterations, maxIterations - 200);

        // Fit view
        setTimeout(function() { fitView(); }, 200);

        // Update mode toggle buttons
        var btns = modeToggle.querySelectorAll('.mode-btn');
        for (var bi = 0; bi < btns.length; bi++) {
            btns[bi].classList.remove('active');
            if (btns[bi].getAttribute('data-mode') === 'character') {
                btns[bi].classList.add('active');
            }
        }
    }

    // ─── Sidebar toggle ───
    var sidebar = document.getElementById('sidebar');
    var sidebarToggle = document.getElementById('sidebar-toggle');
    sidebarToggle.addEventListener('click', function() {
        sidebar.classList.toggle('collapsed');
        sidebarToggle.textContent = sidebar.classList.contains('collapsed') ? '\u203A' : '\u2039';
    });

    // ─── Zoom buttons ───
    document.getElementById('zoom-in').addEventListener('click', function() {
        targetZoom = Math.min(5, targetZoom * 1.3);
    });
    document.getElementById('zoom-out').addEventListener('click', function() {
        targetZoom = Math.max(0.15, targetZoom * 0.7);
    });
    document.getElementById('zoom-reset').addEventListener('click', function() {
        targetZoom = 1;
        cam.x = 0;
        cam.y = 0;
    });

    // ─── Stats bar ───
    var statsBar = document.getElementById('stats-bar');
    function updateStats() {
        if (viewMode === 'faction') {
            var visibleFactions = 0;
            for (var j = 0; j < factionNodes.length; j++) {
                if (factionNodes[j].visible) visibleFactions++;
            }
            statsBar.innerHTML =
                '<span>Th\u1EBF l\u1EF1c: ' + visibleFactions + '/' + factionNodes.length + '</span>' +
                '<span>Li\u00EAn k\u1EBFt: ' + factionEdges.length + '</span>' +
                '<span>Zoom: ' + (cam.zoom * 100).toFixed(0) + '%</span>';
        } else {
            var visibleNodes = 0;
            for (var i = 0; i < nodes.length; i++) {
                if (nodes[i].visible) visibleNodes++;
            }
            statsBar.innerHTML =
                '<span>Nh\u00E2n v\u1EADt: ' + visibleNodes + '/' + nodes.length + '</span>' +
                '<span>Li\u00EAn h\u1EC7: ' + edges.length + '</span>' +
                '<span>Zoom: ' + (cam.zoom * 100).toFixed(0) + '%</span>';
        }
    }

    // ─── Ambient particles ───
    var ambEl = document.getElementById('ambient-particles');
    for (var p = 0; p < 12; p++) {
        var pt = document.createElement('div');
        pt.className = 'ambient-particle';
        var pSize = 1 + Math.random() * 2.5;
        var pOp = 0.06 + Math.random() * 0.12;
        var isJade = Math.random() > 0.4;
        var pColor = isJade ? 'rgba(45,106,79,' + pOp + ')' : 'rgba(201,169,110,' + (pOp * 0.6) + ')';
        pt.style.cssText =
            'width:' + pSize + 'px;height:' + pSize + 'px;' +
            'top:' + (Math.random() * 100) + '%;' +
            'left:' + (Math.random() * 100) + '%;' +
            'background:' + pColor + ';' +
            'box-shadow:0 0 ' + (pSize * 3) + 'px ' + pColor + ';' +
            '--dur:' + (5 + Math.random() * 10) + 's;' +
            '--delay:' + (Math.random() * 6) + 's;' +
            '--dy:' + (-8 - Math.random() * 16) + 'px;' +
            '--o:' + pOp + ';';
        ambEl.appendChild(pt);
    }

    // ─── Animation loop ───
    var frameCount = 0;
    function loop() {
        requestAnimationFrame(loop);

        // Run simulation (multiple steps for initial settling)
        var steps = simIterations < 100 ? 3 : 1;
        for (var s = 0; s < steps; s++) {
            simulate();
        }

        draw();

        frameCount++;
        if (frameCount % 30 === 0) {
            updateStats();
        }
    }

    // Auto-fit initial view
    function fitView() {
        var targetNodes = viewMode === 'faction' ? factionNodes : nodes;
        if (targetNodes.length === 0) return;
        var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        for (var i = 0; i < targetNodes.length; i++) {
            if (!targetNodes[i].visible) continue;
            if (targetNodes[i].x < minX) minX = targetNodes[i].x;
            if (targetNodes[i].x > maxX) maxX = targetNodes[i].x;
            if (targetNodes[i].y < minY) minY = targetNodes[i].y;
            if (targetNodes[i].y > maxY) maxY = targetNodes[i].y;
        }
        if (minX === Infinity) return; // no visible nodes
        var rangeX = maxX - minX + 200;
        var rangeY = maxY - minY + 200;
        cam.x = (minX + maxX) / 2;
        cam.y = (minY + maxY) / 2;
        targetZoom = Math.min(W / rangeX, H / rangeY, 1.5);
        cam.zoom = targetZoom;
    }

    // Start after a brief stabilization
    setTimeout(function() {
        fitView();
    }, 100);

    // Fit again after simulation has settled
    setTimeout(function() {
        fitView();
    }, 2000);

    loop();

    // Collapse sidebar on mobile by default
    if (window.innerWidth < 768) {
        sidebar.classList.add('collapsed');
        sidebarToggle.textContent = '\u203A';
    }

})();
</script>
</body>
</html>
