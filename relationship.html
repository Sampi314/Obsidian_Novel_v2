<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Quan Hệ Đồ — Cố Nguyên Giới</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=Noto+Serif+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
    (function(){
        var t=localStorage.getItem('co-nguyen-theme')||'thuy-mac';
        document.documentElement.setAttribute('data-theme',t);
    })();
    </script>
    <style>
        /* ── Multi-Theme Support ── */
        :root, [data-theme="thuy-mac"] {
            --void: #0c0f14; --deep: #0f1318; --ink: #151a22;
            --paper: #1c222c; --paper-mid: #232a36;
            --accent: #d4a574; --accent-bright: #e8be8e; --accent-dim: #9b7a52;
            --crimson: #7a3040; --crimson-bright: #a64458;
            --sage: #6b8f71; --sage-bright: #82ab88;
            --text: #e8e0d4; --muted: #6a7080;
            --card-bg: rgba(21,26,34,0.85); --card-border: rgba(212,165,116,0.06);
            --card-glow: rgba(212,165,116,0.04);
            --is-light: 0;
        }
        [data-theme="huyet-nguyet"] {
            --void: #100808; --deep: #140c0c; --ink: #1c1212;
            --paper: #241818; --paper-mid: #2c1e1e;
            --accent: #c4746c; --accent-bright: #e09088; --accent-dim: #8a524c;
            --crimson: #8a2020; --crimson-bright: #b83030;
            --sage: #6b8f71; --sage-bright: #82ab88;
            --text: #e8dcd8; --muted: #7a6468;
            --card-bg: rgba(28,18,18,0.85); --card-border: rgba(196,116,108,0.06);
            --card-glow: rgba(196,116,108,0.04);
            --is-light: 0;
        }
        [data-theme="thanh-truc"] {
            --void: #080f0c; --deep: #0c1410; --ink: #121c16;
            --paper: #18241e; --paper-mid: #1e2c24;
            --accent: #7ab88a; --accent-bright: #96d4a6; --accent-dim: #5a8a66;
            --crimson: #7a3040; --crimson-bright: #a64458;
            --sage: #4a9a6a; --sage-bright: #60b880;
            --text: #dce8e0; --muted: #607a68;
            --card-bg: rgba(18,28,22,0.85); --card-border: rgba(122,184,138,0.06);
            --card-glow: rgba(122,184,138,0.04);
            --is-light: 0;
        }
        [data-theme="bach-tuyet"] {
            --void: #f5f0e8; --deep: #eee7dc; --ink: #faf6ef;
            --paper: #e8e0d4; --paper-mid: #f0eae0;
            --accent: #8a6020; --accent-bright: #a07428; --accent-dim: #b8a06a;
            --crimson: #8a3545; --crimson-bright: #a64458;
            --sage: #4a7a52; --sage-bright: #5a9060;
            --text: #2a2420; --muted: #7a7068;
            --card-bg: rgba(250,246,239,0.9); --card-border: rgba(138,96,32,0.08);
            --card-glow: rgba(138,96,32,0.03);
            --is-light: 1;
        }
        [data-theme="co-thu"] {
            --void: #0a0908; --deep: #0f0d0b; --ink: #1a1714;
            --paper: #242019; --paper-mid: #2e2820;
            --accent: #c9a96e; --accent-bright: #e4c98a; --accent-dim: #8a7549;
            --crimson: #6b1c23; --crimson-bright: #9b2c3a;
            --sage: #2d6a4f; --sage-bright: #40916c;
            --text: #d4cbbf; --muted: #7a7067;
            --card-bg: rgba(26,23,20,0.85); --card-border: rgba(201,169,110,0.06);
            --card-glow: rgba(201,169,110,0.04);
            --is-light: 0;
        }

        :root {
            --nam-cuong: #a64458; --bac-bang: #5a9ec4;
            --dong-hoang: #c4a24e; --vo-tan-hai: #3a9e8e;
            --tay-mac: #c89850; --thien-tru: #8a6cb8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }

        body {
            font-family: 'Source Serif 4', 'Georgia', serif;
            background: var(--void);
            color: var(--text);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* Noise overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.03;
            pointer-events: none;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        /* ── Top bar ── */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 48px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 100;
            gap: 12px;
        }

        .back-link {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            color: var(--sage-bright);
            text-decoration: none;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s;
            white-space: nowrap;
        }
        .back-link:hover { color: var(--accent-bright); }
        .back-link svg { width: 14px; height: 14px; }

        .top-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.1em;
            flex: 1;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .theme-select {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--muted);
            font-family: 'Source Serif 4', serif;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            outline: none;
            min-width: 90px;
        }
        .theme-select option { background: var(--ink); color: var(--text); }

        /* ── Canvas ── */
        #graph-canvas {
            position: fixed;
            top: 48px; left: 0;
            width: 100%;
            height: calc(100% - 48px);
            cursor: grab;
            touch-action: none;
        }
        #graph-canvas.grabbing { cursor: grabbing; }

        /* ── Sidebar ── */
        .sidebar {
            position: fixed;
            top: 48px; left: 0;
            width: 260px;
            height: calc(100% - 48px);
            background: var(--card-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-right: 1px solid var(--card-border);
            z-index: 50;
            display: flex;
            flex-direction: column;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .sidebar.collapsed { transform: translateX(-260px); }

        .sidebar-toggle {
            position: fixed;
            top: 60px;
            left: 260px;
            z-index: 51;
            width: 28px;
            height: 36px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-left: none;
            border-radius: 0 4px 4px 0;
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1), color 0.2s;
            backdrop-filter: blur(14px);
        }
        .sidebar.collapsed ~ .sidebar-toggle { left: 0; }
        .sidebar-toggle:hover { color: var(--accent); }

        .sidebar-section {
            padding: 12px 14px 8px;
            border-bottom: 1px solid var(--card-border);
        }

        .sidebar-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        /* Search */
        .search-box {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--card-border);
            color: var(--text);
            font-family: 'Source Serif 4', serif;
            font-size: 0.85rem;
            padding: 7px 10px;
            border-radius: 3px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box::placeholder { color: var(--muted); opacity: 0.6; }
        .search-box:focus { border-color: var(--accent-dim); }

        /* Region filters */
        .region-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .region-btn {
            font-family: 'Source Serif 4', serif;
            font-size: 0.72rem;
            padding: 4px 9px;
            border-radius: 3px;
            border: 1px solid var(--card-border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .region-btn.active {
            color: var(--text);
            border-color: var(--accent-dim);
            background: rgba(255,255,255,0.06);
        }
        .region-btn:hover { border-color: var(--accent-dim); }

        /* Legend */
        .legend-list { display: flex; flex-direction: column; gap: 4px; }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.75rem;
            color: var(--muted);
            cursor: pointer;
            padding: 2px 0;
            transition: color 0.2s;
        }
        .legend-item:hover { color: var(--text); }
        .legend-dot {
            width: 10px; height: 3px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        /* ── Character Info Panel ── */
        .info-panel {
            position: fixed;
            top: 48px; right: 0;
            width: 300px;
            height: calc(100% - 48px);
            background: var(--card-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-left: 1px solid var(--card-border);
            z-index: 50;
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            padding: 20px 16px;
        }
        .info-panel.open { transform: translateX(0); }

        .info-close {
            position: absolute;
            top: 12px; right: 12px;
            background: none; border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.2s;
            width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
        }
        .info-close:hover { color: var(--accent); }

        .info-avatar {
            width: 64px; height: 64px;
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Noto Serif TC', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            position: relative;
        }
        .info-avatar::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid;
            border-color: inherit;
            opacity: 0.3;
            animation: avatar-pulse 2.5s ease-in-out infinite;
        }
        @keyframes avatar-pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.08); opacity: 0.15; }
        }

        .info-name {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--accent);
            text-align: center;
            margin-bottom: 2px;
        }
        .info-title-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            color: var(--muted);
            text-align: center;
            margin-bottom: 12px;
            font-style: italic;
        }

        .info-details {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--card-border);
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }
        .info-row-label { color: var(--muted); }
        .info-row-value { color: var(--text); text-align: right; max-width: 60%; }

        .info-rels-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .info-rel {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .info-rel-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 3px;
        }
        .info-rel-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .info-rel-name {
            font-size: 0.82rem;
            color: var(--text);
            cursor: pointer;
            transition: color 0.2s;
        }
        .info-rel-name:hover { color: var(--accent-bright); }
        .info-rel-type {
            font-size: 0.7rem;
            color: var(--muted);
            margin-left: auto;
        }
        .info-rel-desc {
            font-size: 0.75rem;
            color: var(--muted);
            line-height: 1.5;
            margin-top: 2px;
            padding-left: 12px;
        }

        /* ── Tooltip ── */
        .tooltip {
            position: fixed;
            pointer-events: none;
            z-index: 200;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 0.8rem;
            color: var(--text);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.15s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .tooltip.visible { opacity: 1; }
        .tooltip-name {
            font-family: 'Noto Serif TC', serif;
            font-weight: 600;
            color: var(--accent);
        }
        .tooltip-sub {
            font-size: 0.7rem;
            color: var(--muted);
        }

        /* ── Stats bar ── */
        .stats-bar {
            position: fixed;
            bottom: 10px; left: 50%;
            transform: translateX(-50%);
            z-index: 60;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 4px;
            padding: 5px 14px;
            font-size: 0.7rem;
            color: var(--muted);
            display: flex;
            gap: 16px;
            white-space: nowrap;
        }

        /* ── Zoom controls ── */
        .zoom-controls {
            position: fixed;
            bottom: 50px;
            right: 16px;
            z-index: 60;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .zoom-btn {
            width: 32px; height: 32px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 4px;
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: color 0.2s, border-color 0.2s;
        }
        .zoom-btn:hover { color: var(--accent); border-color: var(--accent-dim); }

        /* ── Ambient particles ── */
        .ambient-particle {
            position: fixed;
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            animation: ambient-float var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
        }
        @keyframes ambient-float {
            0%, 100% { transform: translateY(0); opacity: var(--o, 0.2); }
            50% { transform: translateY(var(--dy, -20px)); opacity: calc(var(--o, 0.2) * 1.5); }
        }

        /* ── Mode toggle ── */
        .mode-toggle {
            display: flex;
            gap: 0;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--card-border);
        }
        .mode-btn {
            flex: 1;
            padding: 6px 12px;
            background: transparent;
            border: none;
            color: var(--muted);
            font-family: 'Source Serif 4', serif;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .mode-btn.active {
            background: var(--sage);
            color: var(--void);
        }
        .mode-btn:hover:not(.active) {
            background: rgba(107,143,113,0.15);
        }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            .sidebar {
                width: 220px;
            }
            .sidebar.collapsed { transform: translateX(-220px); }
            .sidebar-toggle { left: 220px; }
            .sidebar.collapsed ~ .sidebar-toggle { left: 0; }
            .info-panel { width: 100%; }
            .top-title { font-size: 0.82rem; }
            .stats-bar { font-size: 0.65rem; gap: 10px; padding: 4px 10px; }
        }
        @media (max-width: 480px) {
            .sidebar { width: 200px; }
            .sidebar.collapsed { transform: translateX(-200px); }
            .sidebar-toggle { left: 200px; }
            .sidebar.collapsed ~ .sidebar-toggle { left: 0; }
        }
    </style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
    <a href="index.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        Trang Chủ
    </a>
    <div class="top-title">Trận Pháp Quan Hệ  —  Cố Nguyên Giới</div>
    <select class="theme-select" id="theme-select">
        <option value="thuy-mac">Thủy Mặc</option>
        <option value="huyet-nguyet">Huyết Nguyệt</option>
        <option value="thanh-truc">Thanh Trúc</option>
        <option value="bach-tuyet">Bạch Tuyết</option>
        <option value="co-thu">Cổ Thư</option>
    </select>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-section">
        <div class="sidebar-label">Chế Độ Xem</div>
        <div class="mode-toggle" id="mode-toggle">
            <button class="mode-btn active" data-mode="character">Nhân Vật</button>
            <button class="mode-btn" data-mode="faction">Thế Lực</button>
        </div>
    </div>
    <div class="sidebar-section">
        <div class="sidebar-label">Tìm Kiếm</div>
        <input type="text" class="search-box" id="search-box" placeholder="Tên nhân vật...">
    </div>
    <div class="sidebar-section">
        <div class="sidebar-label">Khu Vực</div>
        <div class="region-filters" id="region-filters"></div>
    </div>
    <div class="sidebar-section" style="flex:1;overflow-y:auto;">
        <div class="sidebar-label">Chú Giải</div>
        <div class="legend-list" id="legend-list"></div>
    </div>
</div>
<button class="sidebar-toggle" id="sidebar-toggle" title="Ẩn/hiện thanh bên">&lsaquo;</button>

<!-- Canvas -->
<canvas id="graph-canvas"></canvas>

<!-- Tooltip -->
<div class="tooltip" id="tooltip">
    <div class="tooltip-name" id="tooltip-name"></div>
    <div class="tooltip-sub" id="tooltip-sub"></div>
</div>

<!-- Info Panel -->
<div class="info-panel" id="info-panel">
    <button class="info-close" id="info-close">&times;</button>
    <div id="info-content"></div>
</div>

<!-- Stats Bar -->
<div class="stats-bar" id="stats-bar"></div>

<!-- Zoom Controls -->
<div class="zoom-controls">
    <button class="zoom-btn" id="zoom-in" title="Phóng to">+</button>
    <button class="zoom-btn" id="zoom-out" title="Thu nhỏ">&minus;</button>
    <button class="zoom-btn" id="zoom-reset" title="Đặt lại" style="font-size:0.7rem;">R</button>
</div>

<!-- Ambient particles -->
<div id="ambient-particles"></div>

<script src="scripts/relationship_data.js"></script>
<script>
(function() {
    'use strict';

    // ─── Data normalization ───
    var data = (typeof relationshipData !== 'undefined' ? relationshipData : window.relationshipData) || {};
    var characters = (data.characters || []).slice();
    var relationships = (data.relationships || []).slice();
    var factions = (data.factions || []).slice();

    // Build lookup by id AND by name
    var charById = {};
    var charByName = {};
    var i, c, r;
    for (i = 0; i < characters.length; i++) {
        c = characters[i];
        charById[c.id] = c;
        charByName[c.name] = c;
    }

    // Normalize relationships: handle from/to vs source/target, name-based refs
    function resolveCharId(ref) {
        if (!ref) return null;
        if (charById[ref]) return ref;
        if (charByName[ref]) return charByName[ref].id;
        // Try lowercase/normalized
        var lower = ref.toLowerCase().replace(/\s+/g, '_');
        if (charById[lower]) return lower;
        return null;
    }

    var normalizedRels = [];
    for (i = 0; i < relationships.length; i++) {
        r = relationships[i];
        var src = r.source || r.from;
        var tgt = r.target || r.to;
        var srcId = resolveCharId(src);
        var tgtId = resolveCharId(tgt);
        if (srcId && tgtId) {
            normalizedRels.push({
                source: srcId,
                target: tgtId,
                type: (r.type || 'neutral').toLowerCase().replace(/[\s\/]+/g, '_'),
                description: r.description || r.desc || r.notes || '',
                label: r.label || '',
                strength: r.strength || 50
            });
        }
    }
    relationships = normalizedRels;

    // ─── Relationship type color mapping ───
    var typeColors = {
        'ally': '#4caf50', 'positive': '#4caf50', 'friendly': '#4caf50',
        'dong_minh': '#4caf50', 'hop_tac': '#4caf50',
        'enemy': '#e53935', 'hostile': '#e53935', 'ke_thu': '#e53935',
        'conflict': '#e53935', 'negative': '#e53935',
        'master': '#ffc107', 'subordinate': '#ffc107', 'chu_to': '#ffc107',
        'leader': '#ffc107', 'disciple': '#ffc107',
        'neutral': '#78909c', 'ngo_vuc': '#78909c',
        'rival': '#ff9800',
        'family': '#42a5f5', 'mentor': '#42a5f5'
    };

    function getTypeColor(type) {
        var t = (type || '').toLowerCase().replace(/[\s\/]+/g, '_');
        // Check exact match
        if (typeColors[t]) return typeColors[t];
        // Check partial matches
        if (t.indexOf('dong_minh') >= 0 || t.indexOf('ally') >= 0 || t.indexOf('positive') >= 0 ||
            t.indexOf('friendly') >= 0 || t.indexOf('hop_tac') >= 0 || t.indexOf('bao_ve') >= 0 ||
            t.indexOf('tin_tuong') >= 0 || t.indexOf('che_cho') >= 0 || t.indexOf('dong_doi') >= 0 ||
            t.indexOf('dong_su') >= 0) return '#4caf50';
        if (t.indexOf('enemy') >= 0 || t.indexOf('hostile') >= 0 || t.indexOf('ke_thu') >= 0 ||
            t.indexOf('conflict') >= 0 || t.indexOf('negative') >= 0) return '#e53935';
        if (t.indexOf('master') >= 0 || t.indexOf('subordinate') >= 0 || t.indexOf('chu_to') >= 0 ||
            t.indexOf('leader') >= 0 || t.indexOf('disciple') >= 0 || t.indexOf('cap_tren') >= 0 ||
            t.indexOf('cap_duoi') >= 0) return '#ffc107';
        if (t.indexOf('rival') >= 0 || t.indexOf('canh_tranh') >= 0) return '#ff9800';
        if (t.indexOf('family') >= 0 || t.indexOf('mentor') >= 0 || t.indexOf('chi_em') >= 0 ||
            t.indexOf('su_phu') >= 0 || t.indexOf('su_de') >= 0) return '#42a5f5';
        if (t.indexOf('ngo_vuc') >= 0 || t.indexOf('neutral') >= 0) return '#78909c';
        return '#78909c';
    }

    var legendCategories = [
        { label: 'Đồng minh / Tích cực', color: '#4caf50' },
        { label: 'Thù địch / Xung đột', color: '#e53935' },
        { label: 'Sư phụ / Cấp dưới', color: '#ffc107' },
        { label: 'Trung lập / Ngờ vực', color: '#78909c' },
        { label: 'Địch thủ / Cạnh tranh', color: '#ff9800' },
        { label: 'Gia đình / Sư đồ', color: '#42a5f5' }
    ];

    // ─── Regions ───
    var regionColors = {
        'Tay Mac': '#c89850',
        'Thien Tru': '#8a6cb8',
        'Bac Bang': '#5a9ec4',
        'Vo Tan Hai': '#3a9e8e',
        'Trung Tam': '#d4a574',
        'Dong Hoang': '#c4a24e'
    };

    // Normalize region names for comparison (strip diacritics)
    function normalizeStr(s) {
        if (!s) return '';
        return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[dDdD\u0110\u0111]/g, 'd');
    }

    // Build region -> normalized mapping
    var regionMap = {};
    var allRegions = [];
    for (i = 0; i < characters.length; i++) {
        var reg = characters[i].region;
        if (reg) {
            var normReg = normalizeStr(reg);
            if (!regionMap[normReg]) {
                regionMap[normReg] = reg;
                allRegions.push(reg);
            }
        }
    }
    // Deduplicate using normalized
    var uniqueRegions = [];
    var seenNorm = {};
    for (i = 0; i < allRegions.length; i++) {
        var n = normalizeStr(allRegions[i]);
        if (!seenNorm[n]) {
            seenNorm[n] = true;
            uniqueRegions.push(allRegions[i]);
        }
    }
    allRegions = uniqueRegions;

    function getRegionColor(region) {
        var norm = normalizeStr(region);
        for (var key in regionColors) {
            if (norm === normalizeStr(key)) return regionColors[key];
        }
        return '#888';
    }

    // ─── Build graph nodes ───
    var nodes = [];
    var nodeMap = {};
    var connectionCount = {};

    // Count connections per character
    for (i = 0; i < relationships.length; i++) {
        r = relationships[i];
        connectionCount[r.source] = (connectionCount[r.source] || 0) + 1;
        connectionCount[r.target] = (connectionCount[r.target] || 0) + 1;
    }

    for (i = 0; i < characters.length; i++) {
        c = characters[i];
        var conns = connectionCount[c.id] || 0;
        var radius = Math.max(5, Math.min(18, 5 + conns * 1.3));
        var node = {
            id: c.id,
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            radius: radius,
            character: c,
            connections: conns,
            visible: true,
            highlighted: false,
            selected: false,
            dimmed: false,
            factionCluster: normalizeStr(c.faction || '')
        };
        nodes.push(node);
        nodeMap[c.id] = node;
    }

    // ─── Build edges ───
    var edges = [];
    for (i = 0; i < relationships.length; i++) {
        r = relationships[i];
        if (nodeMap[r.source] && nodeMap[r.target]) {
            edges.push({
                source: nodeMap[r.source],
                target: nodeMap[r.target],
                rel: r,
                color: getTypeColor(r.type)
            });
        }
    }

    // ─── View mode state ───
    var viewMode = 'character'; // 'character' or 'faction'

    // ─── Build faction nodes and edges ───
    var factionNodes = [];
    var factionNodeMap = {};
    var factionEdges = [];

    function buildFactionGraph() {
        factionNodes = [];
        factionNodeMap = {};
        factionEdges = [];

        // Collect unique factions from characters
        var factionMembers = {};  // factionKey -> [node, node, ...]
        var factionNames = {};    // factionKey -> display name
        var factionRegions = {};  // factionKey -> region
        var fi;

        for (fi = 0; fi < nodes.length; fi++) {
            var nd = nodes[fi];
            var fName = nd.character.faction || 'Không Rõ';
            var fKey = normalizeStr(fName);
            if (!factionMembers[fKey]) {
                factionMembers[fKey] = [];
                factionNames[fKey] = fName;
                factionRegions[fKey] = nd.character.region || '';
            }
            factionMembers[fKey].push(nd);
        }

        // Create faction nodes
        var fKeys = [];
        for (var fk in factionMembers) {
            if (factionMembers.hasOwnProperty(fk)) {
                fKeys.push(fk);
            }
        }

        for (fi = 0; fi < fKeys.length; fi++) {
            var key = fKeys[fi];
            var members = factionMembers[key];
            var memberCount = members.length;
            var fRadius = Math.max(30, Math.min(60, 25 + memberCount * 5));
            var fRegion = factionRegions[key];
            var fColor = getRegionColor(fRegion);

            var fNode = {
                id: key,
                x: 0,
                y: 0,
                vx: 0,
                vy: 0,
                radius: fRadius,
                name: factionNames[key],
                region: fRegion,
                memberCount: memberCount,
                members: members,
                color: fColor,
                visible: true,
                highlighted: false,
                selected: false,
                dimmed: false
            };
            factionNodes.push(fNode);
            factionNodeMap[key] = fNode;
        }

        // Aggregate edges between factions
        var fEdgeMap = {}; // "fKeyA||fKeyB" -> { count, types[] }
        for (fi = 0; fi < edges.length; fi++) {
            var e = edges[fi];
            var srcFaction = normalizeStr(e.source.character.faction || 'Không Rõ');
            var tgtFaction = normalizeStr(e.target.character.faction || 'Không Rõ');
            if (srcFaction === tgtFaction) continue; // skip intra-faction

            // Canonical key (alphabetical order)
            var eKey = srcFaction < tgtFaction ? srcFaction + '||' + tgtFaction : tgtFaction + '||' + srcFaction;
            if (!fEdgeMap[eKey]) {
                fEdgeMap[eKey] = { source: srcFaction, target: tgtFaction, count: 0, types: [] };
            }
            fEdgeMap[eKey].count++;
            fEdgeMap[eKey].types.push(e.rel.type);
        }

        // Build faction edges
        for (var ek in fEdgeMap) {
            if (!fEdgeMap.hasOwnProperty(ek)) continue;
            var fe = fEdgeMap[ek];
            if (!factionNodeMap[fe.source] || !factionNodeMap[fe.target]) continue;

            // Determine dominant relationship color
            var typeCounts = {};
            for (var ti = 0; ti < fe.types.length; ti++) {
                var tc = getTypeColor(fe.types[ti]);
                typeCounts[tc] = (typeCounts[tc] || 0) + 1;
            }
            var dominantColor = '#78909c';
            var maxCount = 0;
            var totalTypes = fe.types.length;
            for (var tcc in typeCounts) {
                if (typeCounts[tcc] > maxCount) {
                    maxCount = typeCounts[tcc];
                    dominantColor = tcc;
                }
            }
            // If no clear majority (less than 50%), use gray
            if (maxCount < totalTypes * 0.5) {
                dominantColor = '#78909c';
            }

            var edgeWidth = Math.max(1, Math.min(6, fe.count * 0.8));

            factionEdges.push({
                source: factionNodeMap[fe.source],
                target: factionNodeMap[fe.target],
                count: fe.count,
                color: dominantColor,
                width: edgeWidth,
                types: fe.types
            });
        }

        // Initialize faction node positions in circle
        var fClusterRadius = Math.min(W || 800, H || 600) * 0.3;
        for (fi = 0; fi < factionNodes.length; fi++) {
            var fAngle = (fi / factionNodes.length) * Math.PI * 2 - Math.PI / 2;
            factionNodes[fi].x = Math.cos(fAngle) * fClusterRadius;
            factionNodes[fi].y = Math.sin(fAngle) * fClusterRadius;
        }
    }

    // ─── Layout initialization ───
    var canvas = document.getElementById('graph-canvas');
    var ctx = canvas.getContext('2d');
    var W, H;
    var dpr = window.devicePixelRatio || 1;

    function resizeCanvas() {
        W = window.innerWidth;
        H = window.innerHeight - 48;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resizeCanvas();
    window.addEventListener('resize', function() {
        resizeCanvas();
    });

    // Faction cluster centers
    var factionClusters = {};
    var factionList = [];
    for (i = 0; i < nodes.length; i++) {
        var fc = nodes[i].factionCluster;
        if (fc && !factionClusters[fc]) {
            factionClusters[fc] = { x: 0, y: 0, count: 0 };
            factionList.push(fc);
        }
        if (fc) factionClusters[fc].count++;
    }

    // Place faction clusters in a circle
    var clusterRadius = Math.min(W, H) * 0.32;
    for (i = 0; i < factionList.length; i++) {
        var angle = (i / factionList.length) * Math.PI * 2 - Math.PI / 2;
        factionClusters[factionList[i]].x = Math.cos(angle) * clusterRadius;
        factionClusters[factionList[i]].y = Math.sin(angle) * clusterRadius;
    }

    // Initialize node positions near their faction cluster
    for (i = 0; i < nodes.length; i++) {
        var nd = nodes[i];
        var cl = factionClusters[nd.factionCluster];
        if (cl) {
            nd.x = cl.x + (Math.random() - 0.5) * 100;
            nd.y = cl.y + (Math.random() - 0.5) * 100;
        } else {
            nd.x = (Math.random() - 0.5) * W * 0.6;
            nd.y = (Math.random() - 0.5) * H * 0.6;
        }
    }

    // ─── Camera ───
    var cam = { x: 0, y: 0, zoom: 1 };
    var targetZoom = 1;

    function screenToWorld(sx, sy) {
        return {
            x: (sx - W / 2) / cam.zoom + cam.x,
            y: (sy - H / 2) / cam.zoom + cam.y
        };
    }
    function worldToScreen(wx, wy) {
        return {
            x: (wx - cam.x) * cam.zoom + W / 2,
            y: (wy - cam.y) * cam.zoom + H / 2
        };
    }

    // ─── Physics simulation ───
    var simRunning = true;
    var simCooling = 1.0;
    var simIterations = 0;
    var maxIterations = 600;

    function simulate() {
        if (!simRunning) return;
        if (simIterations > maxIterations) { simCooling *= 0.998; }
        simIterations++;
        var alpha = Math.max(0.001, simCooling * 0.3);

        var ni, nj, dx, dy, dist, force, fx, fy;

        if (viewMode === 'faction') {
            // ─── Faction mode physics ───
            // Repulsion between faction nodes
            for (i = 0; i < factionNodes.length; i++) {
                ni = factionNodes[i];
                if (!ni.visible) continue;
                for (var j = i + 1; j < factionNodes.length; j++) {
                    nj = factionNodes[j];
                    if (!nj.visible) continue;
                    dx = ni.x - nj.x;
                    dy = ni.y - nj.y;
                    dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 1) { dist = 1; dx = Math.random() - 0.5; dy = Math.random() - 0.5; }
                    var fMinDist = (ni.radius + nj.radius) * 2.5;
                    force = 3000 / (dist * dist);
                    if (dist < fMinDist) force += (fMinDist - dist) * 0.8;
                    fx = (dx / dist) * force * alpha;
                    fy = (dy / dist) * force * alpha;
                    ni.vx += fx;
                    ni.vy += fy;
                    nj.vx -= fx;
                    nj.vy -= fy;
                }
            }

            // Spring force along faction edges
            for (i = 0; i < factionEdges.length; i++) {
                var fe = factionEdges[i];
                if (!fe.source.visible || !fe.target.visible) continue;
                dx = fe.target.x - fe.source.x;
                dy = fe.target.y - fe.source.y;
                dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 1) dist = 1;
                var fIdealLen = 150 + (fe.source.radius + fe.target.radius);
                force = (dist - fIdealLen) * 0.01 * alpha;
                fx = (dx / dist) * force;
                fy = (dy / dist) * force;
                fe.source.vx += fx;
                fe.source.vy += fy;
                fe.target.vx -= fx;
                fe.target.vy -= fy;
            }

            // Centering force for faction nodes
            for (i = 0; i < factionNodes.length; i++) {
                ni = factionNodes[i];
                if (!ni.visible) continue;
                ni.vx -= ni.x * 0.0005 * alpha;
                ni.vy -= ni.y * 0.0005 * alpha;
            }

            // Apply velocity with damping for faction nodes
            var fDamping = 0.82;
            var fMaxV = 6;
            for (i = 0; i < factionNodes.length; i++) {
                ni = factionNodes[i];
                if (ni === dragNode) continue;
                ni.vx *= fDamping;
                ni.vy *= fDamping;
                var fSpeed = Math.sqrt(ni.vx * ni.vx + ni.vy * ni.vy);
                if (fSpeed > fMaxV) {
                    ni.vx = (ni.vx / fSpeed) * fMaxV;
                    ni.vy = (ni.vy / fSpeed) * fMaxV;
                }
                ni.x += ni.vx;
                ni.y += ni.vy;
            }
        } else {
            // ─── Character mode physics (original) ───
            // Repulsion between all visible nodes
            for (i = 0; i < nodes.length; i++) {
                ni = nodes[i];
                if (!ni.visible) continue;
                for (var j = i + 1; j < nodes.length; j++) {
                    nj = nodes[j];
                    if (!nj.visible) continue;
                    dx = ni.x - nj.x;
                    dy = ni.y - nj.y;
                    dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 1) { dist = 1; dx = Math.random() - 0.5; dy = Math.random() - 0.5; }
                    var minDist = (ni.radius + nj.radius) * 3;
                    force = 800 / (dist * dist);
                    if (dist < minDist) force += (minDist - dist) * 0.5;
                    fx = (dx / dist) * force * alpha;
                    fy = (dy / dist) * force * alpha;
                    ni.vx += fx;
                    ni.vy += fy;
                    nj.vx -= fx;
                    nj.vy -= fy;
                }
            }

            // Spring force along edges
            for (i = 0; i < edges.length; i++) {
                var e = edges[i];
                if (!e.source.visible || !e.target.visible) continue;
                dx = e.target.x - e.source.x;
                dy = e.target.y - e.source.y;
                dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 1) dist = 1;
                var idealLen = 80 + (e.source.radius + e.target.radius);
                force = (dist - idealLen) * 0.015 * alpha;
                fx = (dx / dist) * force;
                fy = (dy / dist) * force;
                e.source.vx += fx;
                e.source.vy += fy;
                e.target.vx -= fx;
                e.target.vy -= fy;
            }

            // Faction clustering force
            for (i = 0; i < nodes.length; i++) {
                ni = nodes[i];
                if (!ni.visible) continue;
                var cluster = factionClusters[ni.factionCluster];
                if (cluster) {
                    dx = cluster.x - ni.x;
                    dy = cluster.y - ni.y;
                    ni.vx += dx * 0.003 * alpha;
                    ni.vy += dy * 0.003 * alpha;
                }
            }

            // Centering force
            for (i = 0; i < nodes.length; i++) {
                ni = nodes[i];
                if (!ni.visible) continue;
                ni.vx -= ni.x * 0.0003 * alpha;
                ni.vy -= ni.y * 0.0003 * alpha;
            }

            // Apply velocity with damping
            var damping = 0.85;
            var maxV = 8;
            for (i = 0; i < nodes.length; i++) {
                ni = nodes[i];
                if (ni === dragNode) continue;
                ni.vx *= damping;
                ni.vy *= damping;
                var speed = Math.sqrt(ni.vx * ni.vx + ni.vy * ni.vy);
                if (speed > maxV) {
                    ni.vx = (ni.vx / speed) * maxV;
                    ni.vy = (ni.vy / speed) * maxV;
                }
                ni.x += ni.vx;
                ni.y += ni.vy;
            }
        }

        // Gradually cool simulation
        if (simIterations > 200) {
            simCooling *= 0.999;
        }
    }

    // ─── Rendering ───
    var animTime = 0;

    function draw() {
        animTime += 0.016;
        ctx.clearRect(0, 0, W, H);

        // Smooth zoom
        cam.zoom += (targetZoom - cam.zoom) * 0.12;

        ctx.save();
        ctx.translate(W / 2, H / 2);
        ctx.scale(cam.zoom, cam.zoom);
        ctx.translate(-cam.x, -cam.y);

        if (viewMode === 'faction') {
            drawFactionView();
        } else {
            drawCharacterView();
        }

        ctx.restore();
    }

    function drawCharacterView() {
        // Draw edges
        for (i = 0; i < edges.length; i++) {
            var e = edges[i];
            if (!e.source.visible || !e.target.visible) continue;

            var edgeDimmed = false;
            if (selectedNode) {
                if (e.source !== selectedNode && e.target !== selectedNode) {
                    edgeDimmed = true;
                }
            }
            if (searchActive) {
                if (e.source.dimmed && e.target.dimmed) edgeDimmed = true;
            }

            ctx.beginPath();
            ctx.moveTo(e.source.x, e.source.y);
            ctx.lineTo(e.target.x, e.target.y);

            if (edgeDimmed) {
                ctx.strokeStyle = hexToRgba(e.color, 0.06);
                ctx.lineWidth = 0.5;
            } else {
                var edgeAlpha = selectedNode ? 0.6 : 0.2;
                ctx.strokeStyle = hexToRgba(e.color, edgeAlpha);
                ctx.lineWidth = selectedNode ? 1.5 : 0.8;
            }
            ctx.stroke();

            // Glow for selected edges
            if (selectedNode && !edgeDimmed) {
                ctx.beginPath();
                ctx.moveTo(e.source.x, e.source.y);
                ctx.lineTo(e.target.x, e.target.y);
                ctx.strokeStyle = hexToRgba(e.color, 0.15);
                ctx.lineWidth = 4;
                ctx.stroke();
            }
        }

        // Draw nodes
        for (i = 0; i < nodes.length; i++) {
            var nd = nodes[i];
            if (!nd.visible) continue;

            var isDimmed = nd.dimmed || (selectedNode && !nd.selected && !nd.highlighted);
            var isSelected = nd === selectedNode;
            var isHighlighted = nd.highlighted;

            // Node glow
            if (isSelected) {
                var pulseR = nd.radius + 8 + Math.sin(animTime * 3) * 3;
                ctx.beginPath();
                ctx.arc(nd.x, nd.y, pulseR, 0, Math.PI * 2);
                ctx.fillStyle = hexToRgba(nd.character.avatar_color || '#fff', 0.12);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(nd.x, nd.y, pulseR + 4, 0, Math.PI * 2);
                ctx.fillStyle = hexToRgba(nd.character.avatar_color || '#fff', 0.05);
                ctx.fill();
            } else if (isHighlighted) {
                ctx.beginPath();
                ctx.arc(nd.x, nd.y, nd.radius + 5, 0, Math.PI * 2);
                ctx.fillStyle = hexToRgba(nd.character.avatar_color || '#fff', 0.1);
                ctx.fill();
            }

            // Node circle
            ctx.beginPath();
            ctx.arc(nd.x, nd.y, nd.radius, 0, Math.PI * 2);
            var nodeAlpha = isDimmed ? 0.12 : (isSelected ? 1.0 : (isHighlighted ? 0.85 : 0.65));
            ctx.fillStyle = hexToRgba(nd.character.avatar_color || '#888', nodeAlpha);
            ctx.fill();

            // Border
            if (!isDimmed) {
                ctx.beginPath();
                ctx.arc(nd.x, nd.y, nd.radius, 0, Math.PI * 2);
                ctx.strokeStyle = hexToRgba(nd.character.avatar_color || '#888', isSelected ? 0.9 : 0.35);
                ctx.lineWidth = isSelected ? 2 : 1;
                ctx.stroke();
            }

            // POV indicator
            if (nd.character.pov && !isDimmed) {
                ctx.beginPath();
                ctx.arc(nd.x, nd.y, nd.radius + 3, 0, Math.PI * 2);
                ctx.strokeStyle = hexToRgba('#ffc107', 0.4);
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 3]);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // Node label (show when zoomed in enough or selected/highlighted)
            if (cam.zoom > 0.6 || isSelected || isHighlighted) {
                if (!isDimmed || cam.zoom > 1.2) {
                    var labelAlpha = isDimmed ? 0.2 : (isSelected ? 1.0 : (isHighlighted ? 0.9 : Math.min(1, (cam.zoom - 0.4) * 1.5)));
                    var fontSize = Math.max(8, Math.min(12, 10 / cam.zoom));
                    ctx.font = '500 ' + fontSize + 'px "Noto Serif TC", serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'top';
                    ctx.fillStyle = hexToRgba(getComputedCSSVar('--text', '#e8e0d4'), labelAlpha);
                    ctx.fillText(nd.character.name, nd.x, nd.y + nd.radius + 4);
                }
            }
        }
    }

    function drawFactionView() {
        var selectedFNode = selectedFactionNode;

        // Draw faction edges
        for (i = 0; i < factionEdges.length; i++) {
            var fe = factionEdges[i];
            if (!fe.source.visible || !fe.target.visible) continue;

            var fEdgeDimmed = false;
            if (selectedFNode) {
                if (fe.source !== selectedFNode && fe.target !== selectedFNode) {
                    fEdgeDimmed = true;
                }
            }
            if (searchActive) {
                if (fe.source.dimmed && fe.target.dimmed) fEdgeDimmed = true;
            }

            ctx.beginPath();
            ctx.moveTo(fe.source.x, fe.source.y);
            ctx.lineTo(fe.target.x, fe.target.y);

            if (fEdgeDimmed) {
                ctx.strokeStyle = hexToRgba(fe.color, 0.06);
                ctx.lineWidth = 0.5;
            } else {
                var feAlpha = selectedFNode ? 0.6 : 0.3;
                ctx.strokeStyle = hexToRgba(fe.color, feAlpha);
                ctx.lineWidth = selectedFNode ? fe.width * 1.5 : fe.width;
            }
            ctx.stroke();

            // Glow for selected faction edges
            if (selectedFNode && !fEdgeDimmed) {
                ctx.beginPath();
                ctx.moveTo(fe.source.x, fe.source.y);
                ctx.lineTo(fe.target.x, fe.target.y);
                ctx.strokeStyle = hexToRgba(fe.color, 0.12);
                ctx.lineWidth = fe.width + 4;
                ctx.stroke();
            }

            // Edge count label at midpoint
            if (!fEdgeDimmed && cam.zoom > 0.4) {
                var midX = (fe.source.x + fe.target.x) / 2;
                var midY = (fe.source.y + fe.target.y) / 2;
                var eFontSize = Math.max(7, Math.min(10, 9 / cam.zoom));
                ctx.font = '400 ' + eFontSize + 'px "Source Serif 4", serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = hexToRgba(fe.color, 0.7);
                ctx.fillText(fe.count + '', midX, midY);
            }
        }

        // Draw faction nodes
        for (i = 0; i < factionNodes.length; i++) {
            var fn = factionNodes[i];
            if (!fn.visible) continue;

            var fIsDimmed = fn.dimmed || (selectedFNode && !fn.selected && !fn.highlighted);
            var fIsSelected = fn === selectedFNode;
            var fIsHighlighted = fn.highlighted;

            // Node glow
            if (fIsSelected) {
                var fPulseR = fn.radius + 10 + Math.sin(animTime * 2.5) * 4;
                ctx.beginPath();
                ctx.arc(fn.x, fn.y, fPulseR, 0, Math.PI * 2);
                ctx.fillStyle = hexToRgba(fn.color, 0.15);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(fn.x, fn.y, fPulseR + 6, 0, Math.PI * 2);
                ctx.fillStyle = hexToRgba(fn.color, 0.06);
                ctx.fill();
            } else if (fIsHighlighted) {
                ctx.beginPath();
                ctx.arc(fn.x, fn.y, fn.radius + 8, 0, Math.PI * 2);
                ctx.fillStyle = hexToRgba(fn.color, 0.12);
                ctx.fill();
            }

            // Main circle
            ctx.beginPath();
            ctx.arc(fn.x, fn.y, fn.radius, 0, Math.PI * 2);
            var fNodeAlpha = fIsDimmed ? 0.1 : (fIsSelected ? 0.7 : (fIsHighlighted ? 0.55 : 0.4));
            ctx.fillStyle = hexToRgba(fn.color, fNodeAlpha);
            ctx.fill();

            // Border
            if (!fIsDimmed) {
                ctx.beginPath();
                ctx.arc(fn.x, fn.y, fn.radius, 0, Math.PI * 2);
                ctx.strokeStyle = hexToRgba(fn.color, fIsSelected ? 0.9 : 0.5);
                ctx.lineWidth = fIsSelected ? 2.5 : 1.5;
                ctx.stroke();
            }

            // Faction name inside node
            if (!fIsDimmed) {
                var fNameSize = Math.max(7, Math.min(13, fn.radius * 0.35));
                ctx.font = '600 ' + fNameSize + 'px "Noto Serif TC", serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                var fNameAlpha = fIsDimmed ? 0.15 : (fIsSelected ? 1.0 : 0.9);
                ctx.fillStyle = hexToRgba(getComputedCSSVar('--text', '#e8e0d4'), fNameAlpha);

                // Word wrap for long names
                var fNameText = fn.name;
                var fMaxWidth = fn.radius * 1.6;
                var fNameMetrics = ctx.measureText(fNameText);
                if (fNameMetrics.width > fMaxWidth && fNameText.length > 4) {
                    // Split into two lines at middle
                    var fMid = Math.floor(fNameText.length / 2);
                    var fSplitPos = fNameText.indexOf(' ', fMid - 3);
                    if (fSplitPos < 0 || fSplitPos > fMid + 3) fSplitPos = fMid;
                    var fLine1 = fNameText.substring(0, fSplitPos).trim();
                    var fLine2 = fNameText.substring(fSplitPos).trim();
                    ctx.fillText(fLine1, fn.x, fn.y - fNameSize * 0.55);
                    ctx.fillText(fLine2, fn.x, fn.y + fNameSize * 0.55);
                } else {
                    ctx.fillText(fNameText, fn.x, fn.y);
                }

                // Member count below name
                var fCountSize = Math.max(6, Math.min(10, fn.radius * 0.25));
                ctx.font = '400 ' + fCountSize + 'px "Source Serif 4", serif';
                ctx.fillStyle = hexToRgba(getComputedCSSVar('--muted', '#6a7080'), fIsSelected ? 0.9 : 0.7);
                ctx.fillText(fn.memberCount + ' th\u00E0nh vi\u00EAn', fn.x, fn.y + fn.radius + fCountSize + 4);
            }
        }
    }

    function hexToRgba(hex, alpha) {
        if (!hex) hex = '#888888';
        // Handle rgb/rgba
        if (hex.indexOf('rgb') === 0) {
            return hex.replace(')', ', ' + alpha + ')').replace('rgb(', 'rgba(');
        }
        hex = hex.replace('#', '');
        if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
        var rr = parseInt(hex.substring(0, 2), 16);
        var gg = parseInt(hex.substring(2, 4), 16);
        var bb = parseInt(hex.substring(4, 6), 16);
        return 'rgba(' + rr + ',' + gg + ',' + bb + ',' + alpha + ')';
    }

    function getComputedCSSVar(name, fallback) {
        try {
            var val = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
            return val || fallback;
        } catch(e) { return fallback; }
    }

    // ─── Hit testing ───
    function findNodeAt(wx, wy) {
        var hitRadius = 8 / cam.zoom;
        var closest = null;
        var closestDist = Infinity;

        if (viewMode === 'faction') {
            for (var i = 0; i < factionNodes.length; i++) {
                var fn = factionNodes[i];
                if (!fn.visible) continue;
                var dx = fn.x - wx;
                var dy = fn.y - wy;
                var dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < fn.radius + hitRadius && dist < closestDist) {
                    closest = fn;
                    closestDist = dist;
                }
            }
        } else {
            for (var i = 0; i < nodes.length; i++) {
                var nd = nodes[i];
                if (!nd.visible) continue;
                var dx = nd.x - wx;
                var dy = nd.y - wy;
                var dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < nd.radius + hitRadius && dist < closestDist) {
                    closest = nd;
                    closestDist = dist;
                }
            }
        }
        return closest;
    }

    // ─── Interaction state ───
    var selectedNode = null;
    var selectedFactionNode = null;
    var hoveredNode = null;
    var dragNode = null;
    var isPanning = false;
    var panStart = { x: 0, y: 0 };
    var camStart = { x: 0, y: 0 };
    var searchActive = false;
    var activeRegions = {};

    // Initialize all regions active
    for (i = 0; i < allRegions.length; i++) {
        activeRegions[normalizeStr(allRegions[i])] = true;
    }

    // ─── Mouse/Touch handlers ───
    var mouseDown = false;
    var mouseDownPos = { x: 0, y: 0 };
    var mouseDownTime = 0;
    var hasDragged = false;

    canvas.addEventListener('mousedown', function(e) {
        var rect = canvas.getBoundingClientRect();
        var sx = e.clientX - rect.left;
        var sy = e.clientY - rect.top;
        var wp = screenToWorld(sx, sy);
        var node = findNodeAt(wp.x, wp.y);

        mouseDown = true;
        mouseDownPos = { x: e.clientX, y: e.clientY };
        mouseDownTime = Date.now();
        hasDragged = false;

        if (node) {
            dragNode = node;
            // Reheat simulation when dragging
            simCooling = Math.max(simCooling, 0.3);
            simIterations = Math.min(simIterations, maxIterations - 100);
        } else {
            isPanning = true;
            panStart = { x: e.clientX, y: e.clientY };
            camStart = { x: cam.x, y: cam.y };
            canvas.classList.add('grabbing');
        }
    });

    canvas.addEventListener('mousemove', function(e) {
        var rect = canvas.getBoundingClientRect();
        var sx = e.clientX - rect.left;
        var sy = e.clientY - rect.top;
        var wp = screenToWorld(sx, sy);

        if (mouseDown) {
            var ddx = e.clientX - mouseDownPos.x;
            var ddy = e.clientY - mouseDownPos.y;
            if (Math.abs(ddx) > 3 || Math.abs(ddy) > 3) hasDragged = true;
        }

        if (dragNode) {
            dragNode.x = wp.x;
            dragNode.y = wp.y;
            dragNode.vx = 0;
            dragNode.vy = 0;
        } else if (isPanning) {
            var dx = (e.clientX - panStart.x) / cam.zoom;
            var dy = (e.clientY - panStart.y) / cam.zoom;
            cam.x = camStart.x - dx;
            cam.y = camStart.y - dy;
        } else {
            // Hover detection
            var node = findNodeAt(wp.x, wp.y);
            if (node !== hoveredNode) {
                hoveredNode = node;
                updateTooltip(e.clientX, e.clientY);
            }
        }
    });

    canvas.addEventListener('mouseup', function(e) {
        if (dragNode && !hasDragged) {
            selectNode(dragNode);
        } else if (!isPanning && !hasDragged) {
            var rect = canvas.getBoundingClientRect();
            var sx = e.clientX - rect.left;
            var sy = e.clientY - rect.top;
            var wp = screenToWorld(sx, sy);
            var node = findNodeAt(wp.x, wp.y);
            if (!node) {
                deselectNode();
            }
        } else if (isPanning && !hasDragged) {
            deselectNode();
        }

        dragNode = null;
        isPanning = false;
        mouseDown = false;
        canvas.classList.remove('grabbing');
    });

    canvas.addEventListener('mouseleave', function() {
        hoveredNode = null;
        updateTooltip(0, 0);
        if (isPanning) {
            isPanning = false;
            canvas.classList.remove('grabbing');
        }
    });

    // Wheel zoom
    canvas.addEventListener('wheel', function(e) {
        e.preventDefault();
        var zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
        targetZoom = Math.max(0.15, Math.min(5, targetZoom * zoomFactor));

        // Zoom toward mouse position
        var rect = canvas.getBoundingClientRect();
        var sx = e.clientX - rect.left;
        var sy = e.clientY - rect.top;
        var wp = screenToWorld(sx, sy);
        cam.x += (wp.x - cam.x) * (1 - 1/zoomFactor) * 0.3;
        cam.y += (wp.y - cam.y) * (1 - 1/zoomFactor) * 0.3;
    }, { passive: false });

    // ─── Touch handlers ───
    var touches = {};
    var lastPinchDist = 0;

    canvas.addEventListener('touchstart', function(e) {
        e.preventDefault();
        var rect = canvas.getBoundingClientRect();
        if (e.touches.length === 1) {
            var t = e.touches[0];
            var sx = t.clientX - rect.left;
            var sy = t.clientY - rect.top;
            var wp = screenToWorld(sx, sy);
            var node = findNodeAt(wp.x, wp.y);

            mouseDown = true;
            mouseDownPos = { x: t.clientX, y: t.clientY };
            mouseDownTime = Date.now();
            hasDragged = false;

            if (node) {
                dragNode = node;
                simCooling = Math.max(simCooling, 0.3);
            } else {
                isPanning = true;
                panStart = { x: t.clientX, y: t.clientY };
                camStart = { x: cam.x, y: cam.y };
            }
        } else if (e.touches.length === 2) {
            dragNode = null;
            isPanning = false;
            var dx = e.touches[0].clientX - e.touches[1].clientX;
            var dy = e.touches[0].clientY - e.touches[1].clientY;
            lastPinchDist = Math.sqrt(dx * dx + dy * dy);
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', function(e) {
        e.preventDefault();
        var rect = canvas.getBoundingClientRect();
        if (e.touches.length === 1 && (dragNode || isPanning)) {
            var t = e.touches[0];
            var ddx = t.clientX - mouseDownPos.x;
            var ddy = t.clientY - mouseDownPos.y;
            if (Math.abs(ddx) > 5 || Math.abs(ddy) > 5) hasDragged = true;

            if (dragNode) {
                var sx = t.clientX - rect.left;
                var sy = t.clientY - rect.top;
                var wp = screenToWorld(sx, sy);
                dragNode.x = wp.x;
                dragNode.y = wp.y;
                dragNode.vx = 0;
                dragNode.vy = 0;
            } else if (isPanning) {
                var dx = (t.clientX - panStart.x) / cam.zoom;
                var dy = (t.clientY - panStart.y) / cam.zoom;
                cam.x = camStart.x - dx;
                cam.y = camStart.y - dy;
            }
        } else if (e.touches.length === 2) {
            var dx2 = e.touches[0].clientX - e.touches[1].clientX;
            var dy2 = e.touches[0].clientY - e.touches[1].clientY;
            var pinchDist = Math.sqrt(dx2 * dx2 + dy2 * dy2);
            if (lastPinchDist > 0) {
                var scale = pinchDist / lastPinchDist;
                targetZoom = Math.max(0.15, Math.min(5, targetZoom * scale));
            }
            lastPinchDist = pinchDist;
            hasDragged = true;

            // Pan during pinch
            var cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            var cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            if (!isPanning) {
                isPanning = true;
                panStart = { x: cx, y: cy };
                camStart = { x: cam.x, y: cam.y };
            } else {
                var pdx = (cx - panStart.x) / cam.zoom;
                var pdy = (cy - panStart.y) / cam.zoom;
                cam.x = camStart.x - pdx;
                cam.y = camStart.y - pdy;
            }
        }
    }, { passive: false });

    canvas.addEventListener('touchend', function(e) {
        if (e.touches.length === 0) {
            if (dragNode && !hasDragged) {
                selectNode(dragNode);
            } else if (!hasDragged) {
                deselectNode();
            }
            dragNode = null;
            isPanning = false;
            mouseDown = false;
            lastPinchDist = 0;
        } else if (e.touches.length === 1) {
            lastPinchDist = 0;
            var t = e.touches[0];
            panStart = { x: t.clientX, y: t.clientY };
            camStart = { x: cam.x, y: cam.y };
            isPanning = true;
        }
    });

    // ─── Node selection ───
    function selectNode(node) {
        if (viewMode === 'faction') {
            selectFactionNode(node);
            return;
        }
        selectedNode = node;
        selectedFactionNode = null;
        // Mark connected nodes
        for (var i = 0; i < nodes.length; i++) {
            nodes[i].selected = false;
            nodes[i].highlighted = false;
        }
        node.selected = true;

        for (var j = 0; j < edges.length; j++) {
            var e = edges[j];
            if (e.source === node) e.target.highlighted = true;
            if (e.target === node) e.source.highlighted = true;
        }

        showInfoPanel(node);
    }

    function selectFactionNode(fNode) {
        selectedFactionNode = fNode;
        selectedNode = null;
        // Mark connected faction nodes
        for (var i = 0; i < factionNodes.length; i++) {
            factionNodes[i].selected = false;
            factionNodes[i].highlighted = false;
        }
        fNode.selected = true;

        for (var j = 0; j < factionEdges.length; j++) {
            var fe = factionEdges[j];
            if (fe.source === fNode) fe.target.highlighted = true;
            if (fe.target === fNode) fe.source.highlighted = true;
        }

        showFactionInfoPanel(fNode);
    }

    function deselectNode() {
        selectedNode = null;
        selectedFactionNode = null;
        for (var i = 0; i < nodes.length; i++) {
            nodes[i].selected = false;
            nodes[i].highlighted = false;
        }
        for (var j = 0; j < factionNodes.length; j++) {
            factionNodes[j].selected = false;
            factionNodes[j].highlighted = false;
        }
        hideInfoPanel();
    }

    // ─── Tooltip ───
    var tooltipEl = document.getElementById('tooltip');
    var tooltipName = document.getElementById('tooltip-name');
    var tooltipSub = document.getElementById('tooltip-sub');

    function updateTooltip(mx, my) {
        if (hoveredNode && !dragNode) {
            if (viewMode === 'faction' && hoveredNode.name) {
                // Faction node tooltip
                tooltipName.textContent = hoveredNode.name;
                tooltipSub.textContent = (hoveredNode.region || '') + ' | ' + hoveredNode.memberCount + ' th\u00E0nh vi\u00EAn';
            } else if (hoveredNode.character) {
                tooltipName.textContent = hoveredNode.character.name;
                tooltipSub.textContent = (hoveredNode.character.title || '') + ' | ' + (hoveredNode.character.faction || '');
            }
            tooltipEl.style.left = (mx + 14) + 'px';
            tooltipEl.style.top = (my - 10) + 'px';
            tooltipEl.classList.add('visible');
        } else {
            tooltipEl.classList.remove('visible');
        }
    }

    canvas.addEventListener('mousemove', function(e) {
        if (hoveredNode && !dragNode && !isPanning) {
            updateTooltip(e.clientX, e.clientY);
        }
    });

    // ─── Info Panel ───
    var infoPanel = document.getElementById('info-panel');
    var infoContent = document.getElementById('info-content');

    function showInfoPanel(node) {
        var ch = node.character;
        var html = '';

        // Avatar
        html += '<div class="info-avatar" style="background:' + (ch.avatar_color || '#888') + ';border-color:' + (ch.avatar_color || '#888') + '">';
        html += ch.name.charAt(0);
        html += '</div>';

        // Name & title
        html += '<div class="info-name">' + escHtml(ch.name) + '</div>';
        if (ch.title) html += '<div class="info-title-text">' + escHtml(ch.title) + '</div>';

        // Details
        html += '<div class="info-details">';
        if (ch.realm) html += '<div class="info-row"><span class="info-row-label">Cảnh giới</span><span class="info-row-value">' + escHtml(ch.realm) + '</span></div>';
        if (ch.faction) html += '<div class="info-row"><span class="info-row-label">Thế lực</span><span class="info-row-value">' + escHtml(ch.faction) + '</span></div>';
        if (ch.region) html += '<div class="info-row"><span class="info-row-label">Khu vực</span><span class="info-row-value">' + escHtml(ch.region) + '</span></div>';
        if (ch.role) html += '<div class="info-row"><span class="info-row-label">Vai trò</span><span class="info-row-value">' + escHtml(ch.role) + '</span></div>';
        html += '<div class="info-row"><span class="info-row-label">Kết nối</span><span class="info-row-value">' + (node.connections) + ' mối liên hệ</span></div>';
        if (ch.pov) html += '<div class="info-row"><span class="info-row-label">POV</span><span class="info-row-value" style="color:var(--accent-bright)">Góc nhìn chính</span></div>';
        html += '</div>';

        // Relationships
        var rels = [];
        for (var j = 0; j < edges.length; j++) {
            var e = edges[j];
            if (e.source === node) {
                rels.push({ node: e.target, rel: e.rel, color: e.color, direction: 'to' });
            } else if (e.target === node) {
                rels.push({ node: e.source, rel: e.rel, color: e.color, direction: 'from' });
            }
        }

        if (rels.length > 0) {
            html += '<div class="info-rels-title">Quan Hệ (' + rels.length + ')</div>';
            for (var k = 0; k < rels.length; k++) {
                var rel = rels[k];
                var arrow = rel.direction === 'to' ? ' \u2192 ' : ' \u2190 ';
                html += '<div class="info-rel">';
                html += '<div class="info-rel-header">';
                html += '<div class="info-rel-dot" style="background:' + rel.color + '"></div>';
                html += '<span class="info-rel-name" data-node-id="' + rel.node.id + '">' + escHtml(rel.node.character.name) + '</span>';
                html += '<span class="info-rel-type">' + escHtml(rel.rel.type.replace(/_/g, ' ')) + '</span>';
                html += '</div>';
                if (rel.rel.description) {
                    html += '<div class="info-rel-desc">' + escHtml(rel.rel.description) + '</div>';
                }
                html += '</div>';
            }
        }

        infoContent.innerHTML = html;
        infoPanel.classList.add('open');

        // Click handlers for relationship names
        var relNames = infoContent.querySelectorAll('.info-rel-name');
        for (var m = 0; m < relNames.length; m++) {
            relNames[m].addEventListener('click', function() {
                var nid = this.getAttribute('data-node-id');
                if (nodeMap[nid]) {
                    selectNode(nodeMap[nid]);
                    // Pan to node
                    cam.x = nodeMap[nid].x;
                    cam.y = nodeMap[nid].y;
                }
            });
        }
    }

    function hideInfoPanel() {
        infoPanel.classList.remove('open');
    }

    // ─── Faction Info Panel ───
    function showFactionInfoPanel(fNode) {
        var html = '';

        // Faction avatar (first character of name)
        html += '<div class="info-avatar" style="background:' + fNode.color + ';border-color:' + fNode.color + ';width:72px;height:72px;font-size:1.6rem;">';
        html += fNode.name.charAt(0);
        html += '</div>';

        // Name
        html += '<div class="info-name">' + escHtml(fNode.name) + '</div>';
        html += '<div class="info-title-text">Th\u1EBF L\u1EF1c</div>';

        // Details
        html += '<div class="info-details">';
        html += '<div class="info-row"><span class="info-row-label">Khu v\u1EF1c</span><span class="info-row-value">' + escHtml(fNode.region) + '</span></div>';
        html += '<div class="info-row"><span class="info-row-label">Th\u00E0nh vi\u00EAn</span><span class="info-row-value">' + fNode.memberCount + ' nh\u00E2n v\u1EADt</span></div>';

        // Count inter-faction connections
        var interFactionCount = 0;
        for (var ei = 0; ei < factionEdges.length; ei++) {
            if (factionEdges[ei].source === fNode || factionEdges[ei].target === fNode) {
                interFactionCount += factionEdges[ei].count;
            }
        }
        html += '<div class="info-row"><span class="info-row-label">Li\u00EAn k\u1EBFt</span><span class="info-row-value">' + interFactionCount + ' m\u1ED1i quan h\u1EC7</span></div>';
        html += '</div>';

        // Members list
        html += '<div class="info-rels-title">Th\u00E0nh Vi\u00EAn (' + fNode.memberCount + ')</div>';
        for (var mi = 0; mi < fNode.members.length; mi++) {
            var memberNode = fNode.members[mi];
            var ch = memberNode.character;
            html += '<div class="info-rel">';
            html += '<div class="info-rel-header">';
            html += '<div class="info-rel-dot" style="background:' + (ch.avatar_color || '#888') + '"></div>';
            html += '<span class="info-rel-name faction-member-link" data-char-id="' + ch.id + '">' + escHtml(ch.name) + '</span>';
            if (ch.realm) {
                html += '<span class="info-rel-type">' + escHtml(ch.realm) + '</span>';
            }
            html += '</div>';
            if (ch.title) {
                html += '<div class="info-rel-desc">' + escHtml(ch.title) + '</div>';
            }
            html += '</div>';
        }

        // Inter-faction relationships summary
        var connectedFactions = [];
        for (var fi = 0; fi < factionEdges.length; fi++) {
            var fe = factionEdges[fi];
            if (fe.source === fNode) {
                connectedFactions.push({ node: fe.target, count: fe.count, color: fe.color, types: fe.types });
            } else if (fe.target === fNode) {
                connectedFactions.push({ node: fe.source, count: fe.count, color: fe.color, types: fe.types });
            }
        }

        if (connectedFactions.length > 0) {
            html += '<div class="info-rels-title" style="margin-top:16px;">Quan H\u1EC7 Th\u1EBF L\u1EF1c (' + connectedFactions.length + ')</div>';
            for (var ci = 0; ci < connectedFactions.length; ci++) {
                var cf = connectedFactions[ci];
                html += '<div class="info-rel">';
                html += '<div class="info-rel-header">';
                html += '<div class="info-rel-dot" style="background:' + cf.color + '"></div>';
                html += '<span class="info-rel-name faction-link" data-faction-id="' + cf.node.id + '">' + escHtml(cf.node.name) + '</span>';
                html += '<span class="info-rel-type">' + cf.count + ' m\u1ED1i</span>';
                html += '</div>';
                html += '</div>';
            }
        }

        infoContent.innerHTML = html;
        infoPanel.classList.add('open');

        // Click handlers: member links switch to character view
        var memberLinks = infoContent.querySelectorAll('.faction-member-link');
        for (var ml = 0; ml < memberLinks.length; ml++) {
            memberLinks[ml].addEventListener('click', function() {
                var charId = this.getAttribute('data-char-id');
                if (nodeMap[charId]) {
                    switchToCharacterView();
                    selectNode(nodeMap[charId]);
                    cam.x = nodeMap[charId].x;
                    cam.y = nodeMap[charId].y;
                }
            });
        }

        // Click handlers: faction links navigate to that faction
        var factionLinks = infoContent.querySelectorAll('.faction-link');
        for (var fl = 0; fl < factionLinks.length; fl++) {
            factionLinks[fl].addEventListener('click', function() {
                var factionId = this.getAttribute('data-faction-id');
                if (factionNodeMap[factionId]) {
                    selectFactionNode(factionNodeMap[factionId]);
                    cam.x = factionNodeMap[factionId].x;
                    cam.y = factionNodeMap[factionId].y;
                }
            });
        }
    }

    document.getElementById('info-close').addEventListener('click', function() {
        deselectNode();
    });

    function escHtml(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    // ─── Search ───
    var searchBox = document.getElementById('search-box');
    searchBox.addEventListener('input', function() {
        var q = normalizeStr(this.value.trim().toLowerCase());
        searchActive = q.length > 0;

        if (viewMode === 'faction') {
            // Search faction names in faction mode
            for (var i = 0; i < factionNodes.length; i++) {
                if (searchActive) {
                    var fName = normalizeStr(factionNodes[i].name.toLowerCase());
                    var fRegion = normalizeStr((factionNodes[i].region || '').toLowerCase());
                    factionNodes[i].dimmed = !(fName.indexOf(q) >= 0 || fRegion.indexOf(q) >= 0);
                } else {
                    factionNodes[i].dimmed = false;
                }
            }
        } else {
            for (var i = 0; i < nodes.length; i++) {
                if (searchActive) {
                    var name = normalizeStr(nodes[i].character.name.toLowerCase());
                    var faction = normalizeStr((nodes[i].character.faction || '').toLowerCase());
                    var title = normalizeStr((nodes[i].character.title || '').toLowerCase());
                    nodes[i].dimmed = !(name.indexOf(q) >= 0 || faction.indexOf(q) >= 0 || title.indexOf(q) >= 0);
                } else {
                    nodes[i].dimmed = false;
                }
            }
        }
    });

    // ─── Region filters ───
    var regionFiltersEl = document.getElementById('region-filters');

    // "All" button
    var allBtn = document.createElement('button');
    allBtn.className = 'region-btn active';
    allBtn.textContent = 'Tất cả';
    allBtn.setAttribute('data-region', 'all');
    regionFiltersEl.appendChild(allBtn);

    for (i = 0; i < allRegions.length; i++) {
        var btn = document.createElement('button');
        btn.className = 'region-btn active';
        btn.textContent = allRegions[i];
        btn.setAttribute('data-region', normalizeStr(allRegions[i]));
        btn.style.borderLeftColor = getRegionColor(allRegions[i]);
        btn.style.borderLeftWidth = '3px';
        regionFiltersEl.appendChild(btn);
    }

    regionFiltersEl.addEventListener('click', function(e) {
        if (e.target.classList.contains('region-btn')) {
            var region = e.target.getAttribute('data-region');
            if (region === 'all') {
                var allActive = true;
                for (var key in activeRegions) {
                    if (!activeRegions[key]) { allActive = false; break; }
                }
                var newState = !allActive;
                for (var key2 in activeRegions) {
                    activeRegions[key2] = newState;
                }
                var btns = regionFiltersEl.querySelectorAll('.region-btn');
                for (var b = 0; b < btns.length; b++) {
                    if (newState) btns[b].classList.add('active');
                    else btns[b].classList.remove('active');
                }
            } else {
                activeRegions[region] = !activeRegions[region];
                e.target.classList.toggle('active');
                // Update "all" button state
                var allOn = true;
                for (var k in activeRegions) {
                    if (!activeRegions[k]) { allOn = false; break; }
                }
                if (allOn) allBtn.classList.add('active');
                else allBtn.classList.remove('active');
            }

            // Update node visibility
            updateNodeVisibility();

            // Reheat simulation
            simCooling = Math.max(simCooling, 0.5);
            simIterations = Math.min(simIterations, maxIterations - 200);
        }
    });

    function updateNodeVisibility() {
        for (var i = 0; i < nodes.length; i++) {
            var nd = nodes[i];
            var normRegion = normalizeStr(nd.character.region);
            nd.visible = activeRegions[normRegion] !== false;
        }
        // Also update faction node visibility based on region
        for (var j = 0; j < factionNodes.length; j++) {
            var fn = factionNodes[j];
            var fnRegion = normalizeStr(fn.region);
            fn.visible = activeRegions[fnRegion] !== false;
            // If region is empty or unknown, keep visible
            if (!fnRegion) fn.visible = true;
        }
    }

    // ─── Legend ───
    var legendList = document.getElementById('legend-list');
    for (i = 0; i < legendCategories.length; i++) {
        var cat = legendCategories[i];
        var item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = '<div class="legend-dot" style="background:' + cat.color + '"></div><span>' + cat.label + '</span>';
        legendList.appendChild(item);
    }
