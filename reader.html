<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang tải... - Cố Nguyên Giới</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════
           MYSTIC INK — Reader Page
           ═══════════════════════════════════════════ */

        :root {
            --void: #0a0908;
            --abyss: #0f0d0b;
            --ink: #1a1714;
            --parchment-dark: #242019;
            --parchment-mid: #2e2820;
            --gold: #c9a96e;
            --gold-bright: #e4c98a;
            --gold-dim: #8a7549;
            --crimson: #6b1c23;
            --crimson-bright: #9b2c3a;
            --jade: #2d6a4f;
            --jade-bright: #40916c;
            --bone: #d4cbbf;
            --ash: #7a7067;
            --fog: rgba(212, 203, 191, 0.06);

            /* Chapter mode overrides (used by style.css) */
            --bg-color: var(--void);
            --text-color: var(--bone);
            --accent-color: var(--gold);
            --link-color: var(--gold);
            --nav-bg: var(--ink);
            --border-color: rgba(201, 169, 110, 0.1);
            --font-family: 'Lora', 'Georgia', serif;
            --line-height: 1.9;
            --font-size: 19px;
            --max-width: 780px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--void); }
        ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
        html { scroll-behavior: smooth; scrollbar-color: var(--gold-dim) var(--void); }

        body {
            font-family: 'Lora', 'Georgia', serif;
            line-height: 1.9;
            color: var(--bone);
            background-color: var(--void);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Noise overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.025;
            pointer-events: none;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        /* ── Wiki Mode ── */
        body.wiki-page {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 24px 80px;
        }

        body.wiki-page h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 500;
            color: var(--gold);
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: 0.08em;
            padding-bottom: 20px;
            position: relative;
        }

        body.wiki-page h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--crimson), transparent);
        }

        body.wiki-page h2 {
            font-family: 'Playfair Display', serif;
            color: var(--jade-bright);
            margin-top: 48px;
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(45, 106, 79, 0.15);
        }

        body.wiki-page h3 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-top: 32px;
            font-size: 1.15rem;
            font-weight: 500;
            letter-spacing: 0.04em;
        }

        body.wiki-page h4 {
            color: var(--ash);
            margin-top: 24px;
            font-size: 1.05rem;
            font-weight: 600;
        }

        body.wiki-page a {
            color: var(--gold);
            text-decoration: none;
            border-bottom: 1px solid rgba(201, 169, 110, 0.2);
            transition: all 0.3s ease;
        }

        body.wiki-page a:hover {
            color: var(--gold-bright);
            border-bottom-color: var(--gold-bright);
        }

        body.wiki-page p {
            margin-bottom: 1.4em;
            text-align: justify;
            font-size: 1.05rem;
        }

        body.wiki-page ul {
            list-style-type: none;
            padding: 0;
            margin: 16px 0;
        }

        body.wiki-page li {
            background: var(--ink);
            padding: 12px 18px 12px 22px;
            margin-bottom: 6px;
            border-radius: 2px;
            border: 1px solid rgba(201, 169, 110, 0.06);
            border-left: 3px solid var(--crimson);
            transition: all 0.3s ease;
        }

        body.wiki-page li:hover {
            border-left-color: var(--gold);
            background: rgba(201, 169, 110, 0.03);
        }

        body.wiki-page strong { color: var(--gold); }

        body.wiki-page blockquote {
            border-left: 3px solid var(--jade);
            margin: 24px 0;
            padding: 16px 24px;
            background: var(--ink);
            color: var(--ash);
            font-style: italic;
            border-radius: 0 2px 2px 0;
        }

        body.wiki-page hr {
            border: none;
            border-top: 1px solid rgba(201, 169, 110, 0.08);
            margin: 36px 0;
        }

        body.wiki-page table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
        }

        body.wiki-page th,
        body.wiki-page td {
            border: 1px solid rgba(201, 169, 110, 0.1);
            padding: 10px 14px;
            text-align: left;
        }

        body.wiki-page th {
            background: var(--ink);
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }

        body.wiki-page code {
            background: var(--ink);
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 0.88em;
            border: 1px solid rgba(201, 169, 110, 0.06);
        }

        body.wiki-page pre {
            background: var(--ink);
            padding: 18px;
            border-radius: 2px;
            overflow-x: auto;
            border: 1px solid rgba(201, 169, 110, 0.08);
        }

        /* ── Chapter Mode ── */
        body.chapter-page {
            background-color: var(--void);
            color: var(--bone);
            font-family: 'Lora', 'Georgia', serif;
            font-size: 19px;
            max-width: none;
            padding: 64px 0 0;
            border: none;
        }

        body.chapter-page .chapter-content {
            max-width: 780px;
            margin: 0 auto;
            padding: 24px 24px 120px;
        }

        body.chapter-page .chapter-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 500;
            color: var(--gold);
            text-align: center;
            margin-bottom: 48px;
            line-height: 1.3;
            letter-spacing: 0.06em;
            position: relative;
            padding-bottom: 24px;
        }

        body.chapter-page .chapter-content h1::after {
            content: '— ☯ —';
            display: block;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: var(--gold-dim);
            letter-spacing: 0.5em;
        }

        body.chapter-page .chapter-content p {
            margin-bottom: 1.6em;
            text-align: justify;
            text-indent: 2em;
        }

        body.chapter-page .chapter-content p:first-of-type {
            text-indent: 0;
        }

        body.chapter-page .chapter-content p:first-of-type::first-letter {
            font-family: 'Playfair Display', serif;
            font-size: 3.2em;
            float: left;
            line-height: 0.8;
            margin-right: 8px;
            margin-top: 6px;
            color: var(--gold);
        }

        /* ── Loading & Error ── */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 24px;
        }

        .loading-spinner {
            width: 40px; height: 40px;
            border: 2px solid rgba(201, 169, 110, 0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-family: 'Playfair Display', serif;
            font-size: 0.9rem;
            color: var(--ash);
            letter-spacing: 0.15em;
        }

        .error-message {
            text-align: center;
            padding: 100px 24px;
            color: var(--crimson-bright);
            font-size: 1.1rem;
        }

        /* ── Back Link ── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 32px;
            color: var(--ash);
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            border: 1px solid rgba(201, 169, 110, 0.1);
            padding: 10px 20px;
            border-radius: 2px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--gold);
            border-color: rgba(201, 169, 110, 0.3);
            background: rgba(201, 169, 110, 0.03);
        }

        /* ── Footer ── */
        .footer {
            margin-top: 80px;
            text-align: center;
            padding: 32px 24px;
            border-top: 1px solid rgba(201, 169, 110, 0.08);
        }

        .footer p {
            font-family: 'Playfair Display', serif;
            font-size: 0.8rem;
            color: var(--ash);
            letter-spacing: 0.15em;
            text-indent: 0 !important;
        }

        /* ── Content Fade-in ── */
        .wiki-content,
        .chapter-content {
            animation: content-appear 0.6s ease-out;
        }

        @keyframes content-appear {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            body.wiki-page { padding: 24px 16px 60px; }
            body.wiki-page h1 { font-size: 1.6rem; }
            body.chapter-page .chapter-content { padding: 16px 16px 80px; }
            body.chapter-page .chapter-content h1 { font-size: 1.5rem; }
            body.chapter-page .chapter-content p:first-of-type::first-letter {
                font-size: 2.4em;
            }
        }
    </style>
</head>
<body>
    <div id="content">
        <div class="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">Đang tải nội dung...</div>
        </div>
    </div>

    <script src="scripts/navbar.js"></script>
    <script src="scripts/chapter-lock.js"></script>
    <script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var filePath = params.get('file');

        // ── Chapter Lock Integration ──
        (function initReaderChapterLock() {
            // Inject auth container into navbar
            var navLinks = document.querySelector('.mn-links');
            if (navLinks) {
                var authLi = document.createElement('li');
                authLi.id = 'chapter-lock-auth';
                authLi.style.cssText = 'display:flex;align-items:center;';
                navLinks.appendChild(authLi);
            }
            // Also inject into mobile overlay
            var overlay = document.querySelector('.mn-overlay');
            if (overlay) {
                var mobileAuth = document.createElement('div');
                mobileAuth.id = 'chapter-lock-auth-mobile';
                mobileAuth.style.cssText = 'display:flex;align-items:center;justify-content:center;padding:12px;';
                var themeLabel = overlay.querySelector('.mn-overlay-theme-label') || overlay.lastElementChild;
                if (themeLabel) {
                    overlay.insertBefore(mobileAuth, themeLabel);
                } else {
                    overlay.appendChild(mobileAuth);
                }
            }

            if (window.ChapterLock) {
                window.ChapterLock.init();
            }
        })();

        if (!filePath) {
            document.getElementById('content').innerHTML =
                '<div class="error-message">Không tìm thấy tham số file.<br>' +
                '<a href="index.html" class="back-link">\u2190 V\u1ec1 Trang Ch\u1ee7</a></div>';
            return;
        }

        // Determine if this is a chapter page
        var isChapter = /Chương_Truyện\/.*\/Chương_\d+/.test(filePath);

        // Directory of the current file (for resolving relative links)
        var fileDir = filePath.substring(0, filePath.lastIndexOf('/') + 1);

        // Fetch the markdown file
        fetch(encodeURI(filePath))
            .then(function(response) {
                if (!response.ok) throw new Error('Không tìm thấy file: ' + filePath);
                return response.text();
            })
            .then(function(md) {
                // Strip NAVIGATION_START/END block (embedded in .md files)
                md = md.replace(/<!--\s*NAVIGATION_START\s*-->[\s\S]*?<!--\s*NAVIGATION_END\s*-->\s*/g, '');

                // Strip YAML frontmatter
                md = md.replace(/^---\n[\s\S]*?\n---\n/, '');

                // Set page title from first H1
                var titleMatch = md.match(/^#\s+(.+)$/m);
                if (titleMatch) {
                    document.title = titleMatch[1] + ' \u2014 C\u1ed1 Nguy\u00ean Gi\u1edbi';
                }

                // Configure and render markdown
                marked.setOptions({ breaks: true, gfm: true });
                var html = marked.parse(md);

                // Convert internal .md links to reader.html?file= links
                html = html.replace(/href="([^"]*\.md(?:#[^"]*)?)"/g, function(match, link) {
                    // Skip external links
                    if (link.startsWith('http://') || link.startsWith('https://')) return match;

                    // Separate anchor from path
                    var anchor = '';
                    var path = link;
                    var hashIdx = link.indexOf('#');
                    if (hashIdx !== -1) {
                        anchor = link.substring(hashIdx);
                        path = link.substring(0, hashIdx);
                    }

                    // Decode any percent-encoding from marked
                    try { path = decodeURIComponent(path); } catch(e) {}

                    var resolved = resolveRelativePath(fileDir, path);
                    return 'href="reader.html?file=' + encodeURIComponent(resolved) + anchor + '"';
                });

                if (isChapter) {
                    loadChapterMode(html);
                } else {
                    loadWikiMode(html);
                }
            })
            .catch(function(err) {
                document.getElementById('content').innerHTML =
                    '<div class="error-message">' + err.message + '<br>' +
                    '<a href="index.html" class="back-link">\u2190 V\u1ec1 Trang Ch\u1ee7</a></div>';
            });

        function resolveRelativePath(baseDir, relativePath) {
            var baseParts = baseDir.split('/').filter(function(p) { return p !== ''; });
            var relParts = relativePath.split('/');

            for (var i = 0; i < relParts.length; i++) {
                if (relParts[i] === '..') {
                    baseParts.pop();
                } else if (relParts[i] !== '.' && relParts[i] !== '') {
                    baseParts.push(relParts[i]);
                }
            }

            return baseParts.join('/');
        }

        function loadChapterMode(html) {
            document.body.classList.add('chapter-page');

            var contentDiv = document.getElementById('content');
            contentDiv.innerHTML = '';

            // Navigation placeholder (top)
            var navTop = document.createElement('div');
            navTop.id = 'chapter-navigation';
            contentDiv.appendChild(navTop);

            // Chapter content
            var chapterDiv = document.createElement('div');
            chapterDiv.className = 'chapter-content';
            chapterDiv.innerHTML = html;
            contentDiv.appendChild(chapterDiv);

            // Load chapter_data.js -> navigation.js -> tts_player.js
            loadScript('scripts/chapter_data.js', function() {
                loadScript('scripts/navigation.js', function() {
                    loadScript('scripts/tts_player.js');
                });
            });
        }

        function loadWikiMode(html) {
            document.body.classList.add('wiki-page');

            var contentDiv = document.getElementById('content');
            contentDiv.innerHTML = '';

            // Back link
            var backLink = document.createElement('a');
            backLink.href = 'index.html';
            backLink.className = 'back-link';
            backLink.textContent = '\u2190 V\u1ec1 Trang Ch\u1ee7';
            contentDiv.appendChild(backLink);

            // Article content
            var articleDiv = document.createElement('div');
            articleDiv.className = 'wiki-content';
            articleDiv.innerHTML = html;
            contentDiv.appendChild(articleDiv);

            // Footer
            var footer = document.createElement('div');
            footer.className = 'footer';
            footer.innerHTML = '<p>Th\u1ebf Gi\u1edbi Ti\u00ean Hi\u1ec7p C\u1ed1 Nguy\u00ean &copy; 2024</p>';
            contentDiv.appendChild(footer);

            // Inject chapter lock checkmarks after content is rendered
            if (window.ChapterLock) {
                injectMucLucCheckmarks();
            }
        }

        function injectMucLucCheckmarks() {
            // Only inject on MỤC_LỤC pages
            if (!filePath || filePath.indexOf('MỤC_LỤC') === -1) return;

            var dirPath = filePath.replace(/MỤC_LỤC\.md$/, '');

            // Find all chapter links in the rendered content
            var contentArea = document.querySelector('.wiki-page') || document.body;
            var links = contentArea.querySelectorAll('a[href*="reader.html?file="]');

            links.forEach(function (link) {
                var href = link.getAttribute('href');
                var fileMatch = href.match(/file=([^&]+)/);
                if (!fileMatch) return;
                var chapterFile = decodeURIComponent(fileMatch[1]);

                // Only add checkmarks for chapter files (not other MỤC_LỤC links)
                if (!/Chương_\d+/.test(chapterFile)) return;

                // Wrap link and checkmark in a flex container
                var wrapper = document.createElement('span');
                wrapper.style.cssText = 'display:inline-flex;align-items:center;';
                link.parentNode.insertBefore(wrapper, link);
                wrapper.appendChild(link);

                window.ChapterLock.createCheckmark(chapterFile, wrapper);
            });
        }

        function loadScript(src, callback) {
            var script = document.createElement('script');
            script.src = src;
            if (callback) script.onload = callback;
            document.body.appendChild(script);
        }
    })();
    </script>
</body>
</html>
