<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mê Lộ — Cố Nguyên Giới</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=Noto+Serif+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
    (function(){
        var t=localStorage.getItem('co-nguyen-theme')||'thuy-mac';
        document.documentElement.setAttribute('data-theme',t);
    })();
    </script>
    <style>
        /* ── Multi-Theme Support ── */
        :root, [data-theme="thuy-mac"] {
            --void: #0c0f14; --ink: #151a22;
            --accent: #d4a574; --accent-bright: #e8be8e; --accent-dim: #9b7a52;
            --crimson: #7a3040; --crimson-bright: #a64458;
            --sage: #6b8f71; --sage-bright: #82ab88;
            --text: #e8e0d4; --muted: #6a7080;
        }
        [data-theme="huyet-nguyet"] {
            --void: #100808; --ink: #1c1212;
            --accent: #c4746c; --accent-bright: #e09088; --accent-dim: #8a524c;
            --text: #e8dcd8; --muted: #7a6468;
            --crimson: #8a2020; --crimson-bright: #b83030;
            --sage: #6b8f71; --sage-bright: #82ab88;
        }
        [data-theme="thanh-truc"] {
            --void: #080f0c; --ink: #121c16;
            --accent: #7ab88a; --accent-bright: #96d4a6; --accent-dim: #5a8a66;
            --text: #dce8e0; --muted: #607a68;
            --crimson: #7a3040; --crimson-bright: #a64458;
            --sage: #4a9a6a; --sage-bright: #60b880;
        }
        [data-theme="bach-tuyet"] {
            --void: #f5f0e8; --ink: #faf6ef;
            --accent: #8a6020; --accent-bright: #a07428; --accent-dim: #b8a06a;
            --text: #2a2420; --muted: #7a7068;
            --crimson: #8a3545; --crimson-bright: #a64458;
            --sage: #4a7a52; --sage-bright: #5a9060;
        }
        [data-theme="co-thu"] {
            --void: #0a0908; --ink: #1a1714;
            --accent: #c9a96e; --accent-bright: #e4c98a; --accent-dim: #8a7549;
            --text: #d4cbbf; --muted: #7a7067;
            --crimson: #6b1c23; --crimson-bright: #9b2c3a;
            --sage: #2d6a4f; --sage-bright: #40916c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Source Serif 4', 'Georgia', serif;
            background: var(--void);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Noise */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.03;
            pointer-events: none;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        /* ── Background Scene ── */
        .scene {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        /* Void gradient with crimson warning tint */
        .scene-bg {
            position: absolute;
            width: 100%; height: 100%;
            background:
                radial-gradient(ellipse 80% 60% at 50% 40%, rgba(107, 28, 35, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 70% 60%, rgba(201, 169, 110, 0.03) 0%, transparent 50%),
                linear-gradient(to bottom, #06050a 0%, #0a0810 40%, var(--void) 100%);
        }

        /* Broken formation lines */
        .formation {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 600px; height: 600px;
            pointer-events: none;
        }

        .formation-ring {
            position: absolute;
            top: 50%; left: 50%;
            border-radius: 50%;
            border: 1px solid rgba(107, 28, 35, 0.08);
            animation: ring-break var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        @keyframes ring-break {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 0.3;
                border-color: rgba(107, 28, 35, 0.08);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.03) rotate(3deg);
                opacity: 0.6;
                border-color: rgba(201, 169, 110, 0.06);
            }
        }

        /* Drifting seal characters — broken/fading */
        .broken-seal {
            position: absolute;
            font-family: 'Noto Serif TC', serif;
            font-weight: 900;
            color: rgba(107, 28, 35, 0.06);
            animation: seal-fade var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
            user-select: none;
        }

        @keyframes seal-fade {
            0%, 100% { opacity: 0; transform: translateY(0) rotate(0deg); }
            30% { opacity: var(--o, 0.06); transform: translateY(var(--dy, -10px)) rotate(var(--rot, 3deg)); }
            70% { opacity: var(--o, 0.06); transform: translateY(calc(var(--dy, -10px) * 2)) rotate(calc(var(--rot, 3deg) * -1)); }
        }

        /* Scattered particles — crimson/dim */
        .void-particle {
            position: absolute;
            border-radius: 50%;
            animation: void-drift var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        @keyframes void-drift {
            0%, 100% { transform: translate(0, 0); opacity: var(--o, 0.3); }
            50% { transform: translate(var(--dx, 10px), var(--dy, -15px)); opacity: calc(var(--o, 0.3) * 0.4); }
        }

        /* ── Main Content ── */
        .error-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0 24px;
            margin-top: 20px;
        }

        /* 404 number — large, broken, crimson */
        .error-code {
            font-family: 'Noto Serif TC', serif;
            font-size: clamp(6rem, 18vw, 12rem);
            font-weight: 900;
            color: transparent;
            background: linear-gradient(to bottom, rgba(107, 28, 35, 0.25), rgba(107, 28, 35, 0.08));
            -webkit-background-clip: text;
            background-clip: text;
            line-height: 1;
            position: relative;
            opacity: 0;
            animation: code-appear 1.5s ease-out 0.2s forwards;
            letter-spacing: 0.1em;
        }

        /* Cracked line through the number */
        .error-code::after {
            content: '';
            position: absolute;
            top: 50%; left: -5%;
            width: 110%; height: 1px;
            background: linear-gradient(to right,
                transparent 0%,
                rgba(107, 28, 35, 0.3) 20%,
                rgba(201, 169, 110, 0.15) 50%,
                rgba(107, 28, 35, 0.3) 80%,
                transparent 100%
            );
            transform: rotate(-2deg);
            animation: crack-pulse 3s ease-in-out infinite;
        }

        @keyframes crack-pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes code-appear {
            from { opacity: 0; transform: scale(1.1); filter: blur(4px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        .error-title {
            font-family: 'Noto Serif TC', 'Cormorant Garamond', serif;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 0.2em;
            margin-top: 8px;
            opacity: 0;
            animation: fade-rise 1.2s ease-out 0.6s forwards;
            text-shadow: 0 0 40px rgba(201, 169, 110, 0.15);
        }

        .error-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 28px 0;
            opacity: 0;
            animation: fade-rise 1.2s ease-out 0.9s forwards;
        }

        .error-divider-line {
            width: 60px; height: 1px;
            background: linear-gradient(to right, transparent, rgba(107, 28, 35, 0.3));
        }

        .error-divider-line:last-child {
            background: linear-gradient(to left, transparent, rgba(107, 28, 35, 0.3));
        }

        .error-divider-dot {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--crimson-bright);
            box-shadow: 0 0 8px rgba(155, 44, 58, 0.4);
        }

        .error-message {
            font-size: clamp(0.9rem, 1.5vw, 1.05rem);
            color: var(--muted);
            max-width: 480px;
            line-height: 1.9;
            margin-bottom: 12px;
            opacity: 0;
            animation: fade-rise 1.2s ease-out 1.1s forwards;
        }

        .error-verse {
            font-family: 'Noto Serif TC', serif;
            font-size: 0.85rem;
            color: rgba(201, 169, 110, 0.3);
            font-style: italic;
            letter-spacing: 0.15em;
            margin-bottom: 40px;
            opacity: 0;
            animation: fade-rise 1.2s ease-out 1.3s forwards;
        }

        /* Buttons */
        .error-actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            opacity: 0;
            animation: fade-rise 1.2s ease-out 1.5s forwards;
        }

        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-decoration: none;
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }

        .error-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(201, 169, 110, 0.08), transparent);
            transition: left 0.5s ease;
        }

        .error-btn:hover::before { left: 100%; }

        .error-btn--home {
            background: rgba(201, 169, 110, 0.1);
            border: 1px solid rgba(201, 169, 110, 0.2);
            color: var(--accent-bright);
        }

        .error-btn--home:hover {
            background: rgba(201, 169, 110, 0.18);
            border-color: var(--accent);
            box-shadow: 0 4px 24px rgba(201, 169, 110, 0.1);
            transform: translateY(-2px);
        }

        .error-btn--back {
            background: transparent;
            border: 1px solid rgba(212, 203, 191, 0.08);
            color: var(--muted);
        }

        .error-btn--back:hover {
            border-color: rgba(212, 203, 191, 0.2);
            color: var(--text);
            transform: translateY(-2px);
        }

        @keyframes fade-rise {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .formation { width: 350px; height: 350px; }
            .error-actions { flex-direction: column; align-items: center; }
            .error-btn { width: 200px; justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- Background Scene -->
    <div class="scene">
        <div class="scene-bg"></div>

        <!-- Broken formation rings -->
        <div class="formation" id="formation"></div>

        <!-- Broken seal characters -->
        <div id="broken-seals"></div>

        <!-- Void particles -->
        <div id="void-particles"></div>
    </div>

    <!-- Main Content -->
    <div class="error-content">
        <div class="error-code">404</div>
        <h1 class="error-title">迷 路 — Mê Lộ</h1>

        <div class="error-divider">
            <div class="error-divider-line"></div>
            <div class="error-divider-dot"></div>
            <div class="error-divider-line"></div>
        </div>

        <p class="error-message">
            Con đường tu luyện đã bị đứt đoạn.<br>
            Trang bạn tìm kiếm không tồn tại trong Cố Nguyên Giới.
        </p>

        <p class="error-verse">「 道 之 所 失 ， 必 有 歸 途 」</p>

        <div class="error-actions">
            <a href="index.html" class="error-btn error-btn--home">Về Trang Chủ</a>
            <a href="javascript:history.back()" class="error-btn error-btn--back">Quay Lại</a>
        </div>
    </div>

    <script src="scripts/navbar.js"></script>
    <script>
    (function() {
        /* Formation rings */
        var formEl = document.getElementById('formation');
        var ringSizes = [200, 300, 400, 500];
        for (var r = 0; r < ringSizes.length; r++) {
            var ring = document.createElement('div');
            ring.className = 'formation-ring';
            // Make some rings dashed to look "broken"
            var dashStyle = r % 2 === 0 ? 'dashed' : 'solid';
            ring.style.cssText =
                'width:' + ringSizes[r] + 'px;height:' + ringSizes[r] + 'px;' +
                'border-style:' + dashStyle + ';' +
                '--dur:' + (6 + r * 3) + 's;' +
                '--delay:' + (r * 0.5) + 's;';
            formEl.appendChild(ring);
        }

        /* Broken seals */
        var sealsEl = document.getElementById('broken-seals');
        var chars = ['散', '失', '虛', '迷', '空', '斷', '滅', '幻'];
        for (var s = 0; s < 8; s++) {
            var seal = document.createElement('div');
            seal.className = 'broken-seal';
            seal.textContent = chars[s % chars.length];
            var sSize = 30 + Math.random() * 60;
            seal.style.cssText =
                'font-size:' + sSize + 'px;' +
                'top:' + (10 + Math.random() * 80) + '%;' +
                'left:' + (5 + Math.random() * 90) + '%;' +
                '--dur:' + (10 + Math.random() * 15) + 's;' +
                '--delay:' + (Math.random() * 10) + 's;' +
                '--o:' + (0.03 + Math.random() * 0.05) + ';' +
                '--dy:' + (-10 - Math.random() * 20) + 'px;' +
                '--rot:' + (-5 + Math.random() * 10) + 'deg;';
            sealsEl.appendChild(seal);
        }

        /* Void particles */
        var partEl = document.getElementById('void-particles');
        for (var p = 0; p < 20; p++) {
            var pt = document.createElement('div');
            pt.className = 'void-particle';
            var pSize = 1 + Math.random() * 3;
            var pOpacity = 0.1 + Math.random() * 0.25;
            var isCrimson = Math.random() > 0.5;
            var pColor = isCrimson
                ? 'rgba(107,28,35,' + pOpacity + ')'
                : 'rgba(201,169,110,' + (pOpacity * 0.5) + ')';
            pt.style.cssText =
                'width:' + pSize + 'px;height:' + pSize + 'px;' +
                'top:' + (Math.random() * 100) + '%;' +
                'left:' + (Math.random() * 100) + '%;' +
                'background:' + pColor + ';' +
                'box-shadow:0 0 ' + (pSize * 3) + 'px ' + pColor + ';' +
                '--dur:' + (4 + Math.random() * 8) + 's;' +
                '--delay:' + (Math.random() * 6) + 's;' +
                '--dx:' + (Math.random() * 30 - 15) + 'px;' +
                '--dy:' + (Math.random() * -30 - 5) + 'px;' +
                '--o:' + pOpacity + ';';
            partEl.appendChild(pt);
        }
    })();
    </script>
</body>
</html>
